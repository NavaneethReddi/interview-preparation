<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frontend Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0c0e12;
    --bg-card:    #13161c;
    --bg-hover:   #1a1e27;
    --bg-code:    #0a0c10;
    --border:     rgba(255,255,255,0.07);
    --border-md:  rgba(255,255,255,0.12);
    --text:       #eef0f5;
    --text-sub:   #8891a4;
    --text-dim:   #505566;
    --accent:     #6c63ff;
    --accent-dim: rgba(108,99,255,0.12);
    --accent-glow:rgba(108,99,255,0.25);
    --html:       #ff6b35;
    --html-dim:   rgba(255,107,53,0.12);
    --css:        #3b8af7;
    --css-dim:    rgba(59,138,247,0.12);
    --js:         #f7c948;
    --js-dim:     rgba(247,201,72,0.12);
    --react:      #5dd3f3;
    --react-dim:  rgba(93,211,243,0.12);
    --easy:       #4ade80;
    --easy-dim:   rgba(74,222,128,0.12);
    --med:        #fb923c;
    --med-dim:    rgba(251,146,60,0.12);
    --hard:       #f87171;
    --hard-dim:   rgba(248,113,113,0.12);
    --radius:     12px;
    --radius-sm:  8px;
    --font-head:  'Syne', sans-serif;
    --font-body:  'DM Sans', sans-serif;
    --font-mono:  'DM Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ── Header ── */
  header { padding: 56px 0 48px; }

  .header-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-dim); border: 1px solid var(--accent-glow);
    border-radius: 20px; padding: 4px 14px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 20px;
  }
  .header-eyebrow span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(36px, 6vw, 58px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  h1 .gradient {
    background: linear-gradient(135deg, #6c63ff 0%, #5dd3f3 50%, #f7c948 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-desc { color: var(--text-sub); font-size: 16px; max-width: 520px; line-height: 1.7; margin-bottom: 36px; }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 24px; flex-wrap: wrap;
    padding: 20px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 40px;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-num { font-family: var(--font-head); font-size: 26px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }

  /* ── Controls ── */
  .controls { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }

  .search-box {
    position: relative;
  }
  .search-box svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }
  .search-box input {
    width: 100%; padding: 12px 14px 12px 44px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }

  .tab {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 18px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: var(--font-head); font-size: 13px; font-weight: 600;
    color: var(--text-sub); transition: all 0.18s;
    user-select: none;
  }
  .tab:hover { border-color: var(--border-md); color: var(--text); }
  .tab .dot { width: 8px; height: 8px; border-radius: 50%; }
  .tab .cnt { font-family: var(--font-mono); font-size: 10px; opacity: 0.6; }

  .tab.active-html { border-color: var(--html); background: var(--html-dim); color: var(--html); }
  .tab.active-css  { border-color: var(--css);  background: var(--css-dim);  color: var(--css); }
  .tab.active-js   { border-color: var(--js);   background: var(--js-dim);   color: var(--js); }
  .tab.active-react{ border-color: var(--react);background: var(--react-dim);color: var(--react); }

  /* ── Filter pills ── */
  .filters { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-lbl { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }

  .pill {
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: var(--font-mono);
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    user-select: none;
  }
  .pill-all  { background: rgba(255,255,255,0.06); color: var(--text-sub); border-color: var(--border); }
  .pill-easy { background: var(--easy-dim); color: var(--easy); border-color: rgba(74,222,128,0.25); }
  .pill-med  { background: var(--med-dim);  color: var(--med);  border-color: rgba(251,146,60,0.25); }
  .pill-hard { background: var(--hard-dim); color: var(--hard); border-color: rgba(248,113,113,0.25); }
  .pill.inactive { opacity: 0.35; }
  .pill:hover { opacity: 1 !important; }

  /* ── Question cards ── */
  .cards { display: flex; flex-direction: column; gap: 8px; padding-bottom: 80px; }

  .qcard {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.18s;
  }
  .qcard:hover { border-color: var(--border-md); }
  .qcard.open-html  { border-color: rgba(255,107,53,0.35); }
  .qcard.open-css   { border-color: rgba(59,138,247,0.35); }
  .qcard.open-js    { border-color: rgba(247,201,72,0.35); }
  .qcard.open-react { border-color: rgba(93,211,243,0.35); }

  .qheader {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 20px; cursor: pointer; user-select: none;
  }

  .qnum {
    min-width: 28px; height: 28px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
    flex-shrink: 0;
  }

  .qtitle {
    flex: 1; font-size: 14px; font-weight: 500; line-height: 1.5;
    color: var(--text);
  }

  .qmeta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .diff {
    padding: 3px 10px; border-radius: 20px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  }
  .diff-easy { background: var(--easy-dim); color: var(--easy); }
  .diff-med  { background: var(--med-dim);  color: var(--med);  }
  .diff-hard { background: var(--hard-dim); color: var(--hard); }

  .chevron {
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; color: var(--text-dim);
    transition: transform 0.22s ease, background 0.15s;
  }
  .qcard.expanded .chevron { transform: rotate(180deg); }
  .qheader:hover .chevron { background: rgba(255,255,255,0.06); color: var(--text-sub); }

  /* ── Answer body ── */
  .qbody {
    display: none;
    padding: 0 20px 20px 62px;
    border-top: 1px solid var(--border);
  }
  .qcard.expanded .qbody { display: block; }

  .answer-text {
    padding-top: 16px;
    font-size: 14px; color: var(--text-sub); line-height: 1.75;
  }

  .answer-text strong { color: var(--text); font-weight: 500; }

  .code-block {
    margin-top: 14px;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
  }
  .code-lang { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; }
  .copy-btn {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    background: none; border: none; cursor: pointer; padding: 2px 6px;
    border-radius: 4px; transition: all 0.15s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-sub); }
  .copy-btn.copied { color: var(--easy); }

  pre {
    padding: 14px 16px; overflow-x: auto;
    font-family: var(--font-mono); font-size: 12.5px;
    color: #c9d1d9; line-height: 1.65;
    tab-size: 2;
  }

  /* Syntax highlight classes */
  .kw { color: #ff7b72; }       /* keywords */
  .fn { color: #d2a8ff; }       /* functions */
  .st { color: #a5d6ff; }       /* strings */
  .cm { color: #8b949e; font-style: italic; }  /* comments */
  .nm { color: #79c0ff; }       /* numbers */
  .op { color: #ff7b72; }       /* operators */

  /* ── Empty state ── */
  .empty {
    display: none; text-align: center; padding: 64px 24px;
    color: var(--text-dim);
  }
  .empty svg { margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* ── Progress bar ── */
  .progress-bar {
    height: 2px; background: var(--border); border-radius: 2px;
    margin-bottom: 28px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--react));
    transition: width 0.3s ease;
  }

  /* ── Section label ── */
  .section-label {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-label-left {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-head); font-size: 13px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .section-dot { width: 10px; height: 10px; border-radius: 50%; }
  .section-count { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .qbody { padding-left: 20px; }
    .stats { gap: 16px; }
    h1 { font-size: 32px; }
  }

  /* ── Fade-in animation ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .qcard { animation: fadeUp 0.2s ease both; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-eyebrow"><span></span> Interview Prep Hub</div>
    <h1>Frontend <span class="gradient">Interview</span><br>Questions</h1>
    <p class="header-desc">Master the most asked questions across HTML, CSS, JavaScript, and React. Curated answers with real code examples.</p>

    <div class="stats">
      <div class="stat"><span class="stat-num" style="color:var(--html)">10</span><span class="stat-lbl">HTML</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--css)">10</span><span class="stat-lbl">CSS</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--js)">10</span><span class="stat-lbl">JavaScript</span></div>
      <div class="stat"><span class="stat-num" style="color:var(--react)">12</span><span class="stat-lbl">React</span></div>
      <div class="stat" style="margin-left:auto;"><span class="stat-num" id="viewed-count" style="color:var(--accent)">0</span><span class="stat-lbl">Viewed</span></div>
    </div>
  </header>

  <div class="controls">
    <div class="search-box">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search questions, answers, or topics..." autocomplete="off" />
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="filters">
      <span class="filter-lbl">Difficulty:</span>
      <span class="pill pill-all" id="f-all" onclick="setFilter('all')">All</span>
      <span class="pill pill-easy" id="f-Easy" onclick="setFilter('Easy')">Easy</span>
      <span class="pill pill-med"  id="f-Medium" onclick="setFilter('Medium')">Medium</span>
      <span class="pill pill-hard" id="f-Hard" onclick="setFilter('Hard')">Hard</span>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>

  <div class="section-label">
    <div class="section-label-left">
      <span class="section-dot" id="section-dot"></span>
      <span id="section-title">HTML</span>
    </div>
    <span class="section-count" id="section-count"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div class="empty" id="empty">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No questions match your search.</p>
  </div>
</div>

<script>
const TABS = ['HTML','CSS','JavaScript','React'];
const COLORS = { HTML:'#ff6b35', CSS:'#3b8af7', JavaScript:'#f7c948', React:'#5dd3f3' };

const DATA = {
HTML: [
  { q:"What is the purpose of <!DOCTYPE html>?", d:"Easy",
    a:"It tells the browser which version of HTML the document uses. Without it, browsers enter <strong>quirks mode</strong> — a legacy rendering mode with inconsistent behavior across browsers. &lt;!DOCTYPE html&gt; triggers standards mode in all modern browsers.",
    code:"&lt;!-- Always the very first line of your HTML --&gt;\n&lt;!DOCTYPE html&gt;\n&lt;html lang=\"en\"&gt;\n  &lt;head&gt;...&lt;/head&gt;\n&lt;/html&gt;" },
  { q:"What is semantic HTML and why does it matter?", d:"Easy",
    a:"Semantic HTML uses meaningful tags that describe the <strong>purpose</strong> of content — &lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;article&gt;, &lt;section&gt;, &lt;footer&gt; — rather than generic &lt;div&gt; and &lt;span&gt;. Benefits: accessibility (screen readers understand structure), SEO (search engines weight semantic content), and maintainability.",
    code:"&lt;!-- Non-semantic (avoid) --&gt;\n&lt;div class=\"header\"&gt;\n  &lt;div class=\"nav\"&gt;...&lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- Semantic (prefer) --&gt;\n&lt;header&gt;\n  &lt;nav&gt;...&lt;/nav&gt;\n&lt;/header&gt;\n&lt;main&gt;\n  &lt;article&gt;...&lt;/article&gt;\n  &lt;aside&gt;...&lt;/aside&gt;\n&lt;/main&gt;" },
  { q:"What is the difference between <script>, <script async>, and <script defer>?", d:"Medium",
    a:"<strong>&lt;script&gt;</strong> blocks HTML parsing until the script downloads and executes. <strong>async</strong> downloads in parallel and runs immediately when ready — order not guaranteed. <strong>defer</strong> downloads in parallel but waits until HTML is fully parsed — order is preserved. Use defer for most scripts.",
    code:"&lt;!-- Blocks rendering -- avoid --&gt;\n&lt;script src=\"app.js\"&gt;&lt;/script&gt;\n\n&lt;!-- Parallel download, runs immediately (unordered) --&gt;\n&lt;script src=\"analytics.js\" async&gt;&lt;/script&gt;\n\n&lt;!-- Parallel download, runs after DOM parsed (ordered) --&gt;\n&lt;script src=\"app.js\" defer&gt;&lt;/script&gt;" },
  { q:"What is the difference between id and class attributes?", d:"Easy",
    a:"An <strong>id</strong> must be unique per page — only one element can have a given id. A <strong>class</strong> can be reused on unlimited elements. Use id for unique targets (anchor links, JS hooks) and class for styling reusable groups. In CSS, id (#) has higher specificity than class (.).",
    code:"&lt;!-- id: unique, higher specificity --&gt;\n&lt;header id=\"main-nav\"&gt;...&lt;/header&gt;\n\n&lt;!-- class: reusable, lower specificity --&gt;\n&lt;div class=\"card featured\"&gt;...&lt;/div&gt;\n&lt;div class=\"card\"&gt;...&lt;/div&gt;" },
  { q:"What are data-* attributes?", d:"Easy",
    a:"Custom attributes that store extra data on HTML elements without non-standard attributes. They're accessible in JS via <strong>element.dataset</strong> and can be styled in CSS with attribute selectors. Great for passing config to JS components without separate JS variables.",
    code:"&lt;button data-user-id=\"42\" data-role=\"admin\" data-confirm=\"true\"&gt;\n  Delete Account\n&lt;/button&gt;\n\n&lt;script&gt;\n  const btn = document.querySelector('button');\n  btn.dataset.userId   // '42'\n  btn.dataset.role     // 'admin'\n  btn.dataset.confirm  // 'true'\n&lt;/script&gt;" },
  { q:"What is the difference between <strong>, <b>, <em>, and <i>?", d:"Easy",
    a:"<strong>&lt;strong&gt;</strong> = important content (semantic — screen readers announce it). <strong>&lt;b&gt;</strong> = bold for stylistic reasons only (no semantic meaning). <strong>&lt;em&gt;</strong> = stressed emphasis that changes meaning (semantic). <strong>&lt;i&gt;</strong> = italic without emphasis — for technical terms, foreign words, thoughts.",
    code:"&lt;p&gt;This is &lt;strong&gt;critically important&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;The word &lt;em&gt;must&lt;/em&gt; be there.&lt;/p&gt;\n&lt;p&gt;Press the &lt;b&gt;Start&lt;/b&gt; button.&lt;/p&gt;\n&lt;p&gt;The genus &lt;i&gt;Homo sapiens&lt;/i&gt;.&lt;/p&gt;" },
  { q:"What are meta tags and why are they important?", d:"Medium",
    a:"Meta tags sit inside &lt;head&gt; and provide metadata about the page — invisible to users but critical for browsers, search engines, and social platforms. The <strong>viewport</strong> meta is essential for mobile responsiveness. <strong>og:*</strong> tags control how the page looks when shared on social media.",
    code:"&lt;head&gt;\n  &lt;meta charset=\"UTF-8\" /&gt;\n  &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" /&gt;\n  &lt;meta name=\"description\" content=\"Page description for SEO (150-160 chars)\" /&gt;\n  &lt;meta property=\"og:title\" content=\"Page Title\" /&gt;\n  &lt;meta property=\"og:image\" content=\"/preview.png\" /&gt;\n  &lt;title&gt;Page Title&lt;/title&gt;\n&lt;/head&gt;" },
  { q:"What is the purpose of the alt attribute on images?", d:"Easy",
    a:"Alt provides a <strong>text alternative</strong> when images fail to load, and is read aloud by screen readers. Empty alt (alt=\"\") tells screen readers the image is purely decorative. A missing alt attribute is an accessibility violation. Descriptive alt text also contributes to image SEO.",
    code:"&lt;!-- Informative image -- describe it --&gt;\n&lt;img src=\"chart.png\" alt=\"Bar chart showing 40% growth in Q4 2024\" /&gt;\n\n&lt;!-- Decorative image -- empty alt --&gt;\n&lt;img src=\"divider.png\" alt=\"\" /&gt;\n\n&lt;!-- Missing alt -- accessibility violation --&gt;\n&lt;img src=\"photo.jpg\" /&gt; ❌" },
  { q:"What is the difference between <link> and @import for stylesheets?", d:"Medium",
    a:"<strong>&lt;link&gt;</strong> is an HTML tag that loads CSS in parallel with page parsing — always preferred. <strong>@import</strong> is a CSS rule that loads stylesheets sequentially and blocks rendering until each imported sheet is downloaded. Link is always faster and should be used for all external stylesheets.",
    code:"&lt;!-- Preferred: parallel, non-blocking --&gt;\n&lt;link rel=\"stylesheet\" href=\"style.css\" /&gt;\n\n&lt;!-- Avoid: sequential, blocks render --&gt;\n&lt;style&gt;\n  @import url('style.css'); /* slower */\n&lt;/style&gt;" },
  { q:"What is the difference between block, inline, and inline-block?", d:"Easy",
    a:"<strong>Block</strong> elements (&lt;div&gt;, &lt;p&gt;, &lt;h1&gt;) start on a new line and stretch full width. <strong>Inline</strong> elements (&lt;span&gt;, &lt;a&gt;) flow within text and only take their content's width. <strong>Inline-block</strong> flows inline but accepts width, height, and vertical padding/margin like a block.",
    code:"/* Block: full width, new line */\ndiv { display: block; }\n\n/* Inline: content width, no height/top-bottom margin */\nspan { display: inline; }\n\n/* Inline-block: inline flow + block sizing */\n.badge { display: inline-block; width: 24px; height: 24px; }" },
],
CSS: [
  { q:"What is the CSS Box Model?", d:"Easy",
    a:"Every element is a rectangular box with four layers: <strong>content</strong>, <strong>padding</strong> (inner space), <strong>border</strong>, and <strong>margin</strong> (outer space). By default (content-box), width/height applies to content only. Use <strong>box-sizing: border-box</strong> globally to include padding and border in the declared size — this is always recommended.",
    code:"/* Always add this global reset */\n*, *::before, *::after {\n  box-sizing: border-box;\n}\n\n.box {\n  width: 200px;    /* includes padding + border */\n  padding: 20px;\n  border: 2px solid #ccc;\n  margin: 16px;    /* outside, not included in width */\n}" },
  { q:"What is CSS specificity and how are conflicts resolved?", d:"Medium",
    a:"Specificity is calculated as <strong>(inline, id, class/attr, element)</strong> — each column wins over lower columns regardless of count. Inline styles (style=\"\") always win. !important overrides everything (use sparingly). When specificity ties, the <strong>last rule in source order</strong> wins.",
    code:"/* (0,0,1,0) — class */\n.button { color: blue; }\n\n/* (0,1,0,0) — id — wins over class */\n#submit { color: red; }\n\n/* (0,0,2,1) — two classes + element */\ndiv.card.featured { color: green; }\n\n/* Overrides everything — avoid */\n.btn { color: orange !important; }" },
  { q:"What is Flexbox and when do you use it?", d:"Medium",
    a:"Flexbox is a <strong>one-dimensional</strong> layout system — it distributes space along a single row or column. Perfect for: navigation bars, centering elements vertically, equal-height cards, distributing space between items. Set display: flex on the parent; all direct children become flex items.",
    code:".nav {\n  display: flex;\n  align-items: center;           /* cross-axis: vertical */\n  justify-content: space-between; /* main-axis: horizontal */\n  gap: 16px;\n}\n\n/* Center anything perfectly */\n.center {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}" },
  { q:"What is CSS Grid and how does it differ from Flexbox?", d:"Medium",
    a:"Grid is <strong>two-dimensional</strong> — it controls rows AND columns simultaneously. Flexbox is one-dimensional. Use Grid for page-level layouts and complex 2D arrangements. Use Flexbox for component alignment and single-axis distribution. They complement each other — use both.",
    code:".layout {\n  display: grid;\n  grid-template-columns: 240px 1fr;     /* sidebar + main */\n  grid-template-rows: 64px 1fr 48px;   /* header, content, footer */\n  gap: 16px;\n  min-height: 100vh;\n}\n\n/* Responsive columns */\n.cards {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n}" },
  { q:"What is the difference between CSS position values?", d:"Medium",
    a:"<strong>static</strong>: default, normal flow. <strong>relative</strong>: offset from normal position, still occupies space, creates positioning context. <strong>absolute</strong>: removed from flow, positioned relative to nearest positioned ancestor. <strong>fixed</strong>: relative to viewport, stays on scroll. <strong>sticky</strong>: relative until threshold, then fixed.",
    code:".sticky-header {\n  position: sticky;\n  top: 0;         /* sticks at 0px from top */\n  z-index: 100;\n}\n\n.tooltip {\n  position: absolute; /* relative to nearest positioned parent */\n  top: calc(100% + 8px);\n  left: 50%;\n  transform: translateX(-50%);\n}" },
  { q:"What is the difference between em, rem, px, vh, and vw?", d:"Easy",
    a:"<strong>px</strong>: absolute, fixed size. <strong>em</strong>: relative to parent's font-size — compounds in nested elements. <strong>rem</strong>: relative to root &lt;html&gt; font-size — predictable, doesn't compound. <strong>vh/vw</strong>: percentage of viewport height/width. Best practice: rem for fonts, px for borders/shadows, % or fr for layouts.",
    code:":root { font-size: 16px; }\n\n.text {\n  font-size: 1rem;    /* 16px — predictable */\n  padding: 0.75em;    /* relative to THIS element's font-size */\n  border: 1px solid;  /* px for fine details */\n}\n\n.hero {\n  height: 100vh;      /* full viewport height */\n  width: min(90vw, 1200px);\n}" },
  { q:"What are CSS custom properties (variables)?", d:"Easy",
    a:"CSS variables are declared with <strong>--</strong> prefix and accessed via <strong>var()</strong>. Unlike preprocessor variables (Sass/Less), they: cascade and inherit like any CSS property, can be updated at runtime with JavaScript, can be scoped to any element, and respond to media queries.",
    code:":root {\n  --color-primary: #6c63ff;\n  --spacing-md: 1rem;\n  --radius: 8px;\n}\n\n/* Scoped override */\n[data-theme='dark'] {\n  --color-primary: #a89cff;\n}\n\n.button {\n  background: var(--color-primary);\n  padding: var(--spacing-md);\n  border-radius: var(--radius);\n}\n\n/* Update via JS */\ndocument.documentElement.style\n  .setProperty('--color-primary', '#ff6b35');" },
  { q:"What is z-index and what creates a stacking context?", d:"Hard",
    a:"z-index controls layer order — higher values render in front. It only works on <strong>positioned</strong> elements (not static). A new stacking context is created by: position + z-index != auto, opacity < 1, transform, filter, will-change, isolation: isolate. Elements inside a context are sorted only within it — a z-index:9999 child can't escape a z-index:1 parent.",
    code:"/* Creates a stacking context */\n.modal-container {\n  position: fixed;\n  z-index: 1000;\n  /* All children z-index relative to this */\n}\n\n/* Explicit stacking context */\n.component {\n  isolation: isolate; /* clean stacking context */\n}" },
  { q:"What is the difference between display:none and visibility:hidden?", d:"Easy",
    a:"<strong>display: none</strong> removes the element from document flow — takes up zero space, inaccessible to screen readers. <strong>visibility: hidden</strong> hides the element but it still occupies its layout space. <strong>opacity: 0</strong> is invisible but still interactive and occupies space. Use opacity for animations.",
    code:"/* Completely removed from layout */\n.hidden { display: none; }\n\n/* Invisible but occupies space */\n.ghost { visibility: hidden; }\n\n/* Invisible, interactive, animatable */\n.fade { opacity: 0; transition: opacity 0.3s; }\n.fade:hover { opacity: 1; }" },
  { q:"What is a pseudo-class vs a pseudo-element?", d:"Medium",
    a:"<strong>Pseudo-classes</strong> (:hover, :focus, :nth-child, :checked) target elements in a specific state. <strong>Pseudo-elements</strong> (::before, ::after, ::first-line) style a specific part of an element's content. The double-colon (::) for pseudo-elements is the modern convention but single-colon still works for legacy support.",
    code:"/* Pseudo-class — element in a state */\n.btn:hover { background: #5a52e0; }\n.input:focus { outline: 2px solid blue; }\nli:nth-child(odd) { background: #f9f9f9; }\n\n/* Pseudo-element — virtual sub-element */\n.card::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n}\n\np::first-line { font-weight: 500; }" },
],
JavaScript: [
  { q:"What is the difference between var, let, and const?", d:"Easy",
    a:"<strong>var</strong>: function-scoped, hoisted with undefined, can be re-declared — avoid in modern code. <strong>let</strong>: block-scoped, not initialized on hoist (TDZ), reassignable. <strong>const</strong>: block-scoped, must be initialized, cannot be reassigned — but objects/arrays it references are still mutable.",
    code:"var x = 1;    // function scope, re-declarable, hoisted\nlet y = 2;    // block scope, reassignable\nconst z = 3;  // block scope, not reassignable\n\n// const with objects -- reference is locked, not contents\nconst obj = { a: 1 };\nobj.a = 2;      // ✅ mutation is allowed\nobj = {};       // ❌ TypeError: Assignment to constant" },
  { q:"What is a closure?", d:"Medium",
    a:"A closure is created when an inner function <strong>retains access to its outer function's scope</strong> even after the outer function has returned. Closures enable: private state, factory functions, memoization, event handler patterns, and the module pattern.",
    code:"function makeCounter(start = 0) {\n  let count = start;   // enclosed variable\n  return {\n    increment: () => ++count,\n    decrement: () => --count,\n    value:     () => count,\n    reset:     () => { count = start; }\n  };\n}\n\nconst counter = makeCounter(10);\ncounter.increment(); // 11\ncounter.increment(); // 12\ncounter.value();     // 12\n// count is private -- not accessible outside" },
  { q:"How does the JavaScript event loop work?", d:"Hard",
    a:"JS is single-threaded. The event loop works in order: 1) run all synchronous code (call stack). 2) drain all <strong>microtasks</strong> (Promise callbacks, queueMicrotask). 3) run one <strong>macrotask</strong> (setTimeout, setInterval, I/O). 4) repeat. This is why Promise callbacks always run before setTimeout, even with 0ms delay.",
    code:"console.log('1 — sync');\n\nsetTimeout(() => console.log('4 — macrotask'), 0);\n\nPromise.resolve()\n  .then(() => console.log('2 — microtask'))\n  .then(() => console.log('3 — microtask'));\n\nconsole.log('still sync');\n// Output: 1, still sync, 2, 3, 4" },
  { q:"What is hoisting in JavaScript?", d:"Medium",
    a:"Hoisting moves <strong>declarations</strong> (not initializations) to the top of their scope during compilation. var is hoisted and initialized as undefined. Function declarations are fully hoisted — callable before definition. let/const are hoisted but not initialized — accessing before declaration throws a <strong>ReferenceError</strong> (Temporal Dead Zone).",
    code:"console.log(a); // undefined (var hoisted)\nvar a = 5;\n\nconsole.log(b); // ReferenceError: TDZ\nlet b = 5;\n\nfoo();          // ✅ works — fully hoisted\nfunction foo() { return 'hello'; }\n\nbar();          // ❌ TypeError — not yet assigned\nconst bar = () => 'arrow';" },
  { q:"How do Promises and async/await work?", d:"Medium",
    a:"A Promise represents a value that may be available now, later, or never — it's <strong>pending</strong>, <strong>fulfilled</strong>, or <strong>rejected</strong>. async/await is syntactic sugar over Promises: async functions always return a Promise, await pauses function execution until the Promise settles. Use try/catch for error handling.",
    code:"// Promise chain\nfetch('/api/user')\n  .then(res => res.json())\n  .then(user => console.log(user))\n  .catch(err => console.error(err));\n\n// async/await — same thing, more readable\nasync function getUser() {\n  try {\n    const res  = await fetch('/api/user');\n    const user = await res.json();\n    return user;\n  } catch (err) {\n    console.error('Failed:', err);\n  }\n}\n\n// Run multiple in parallel\nconst [user, posts] = await Promise.all([\n  getUser(), getPosts()\n]);" },
  { q:"What is 'this' in JavaScript?", d:"Hard",
    a:"<strong>this</strong> is determined by <em>how</em> a function is called, not where it's defined. In a method: this = the object. Standalone call: undefined (strict) or globalThis. Arrow functions don't have own this — they inherit from lexical scope. call/apply/bind explicitly set this.",
    code:"const person = {\n  name: 'Alice',\n  greet() { return `Hi, ${this.name}`; },\n  arrowGreet: () => `Hi, ${this.name}`, // undefined!\n};\n\nperson.greet();      // 'Hi, Alice'\nperson.arrowGreet(); // 'Hi, undefined'\n\nconst fn = person.greet;\nfn();                // 'Hi, undefined' (lost context)\nfn.call(person);     // 'Hi, Alice'\n\nconst bound = person.greet.bind(person);\nbound();             // 'Hi, Alice' (permanently bound)" },
  { q:"What is event delegation?", d:"Medium",
    a:"Instead of attaching listeners to each child, attach <strong>one listener to a common parent</strong>. Events bubble up from the target — the parent handler uses event.target to identify the source. More performant for long lists, works for dynamically added elements, reduces memory usage.",
    code:"// ❌ Inefficient -- listener on each item\ndocument.querySelectorAll('li').forEach(li =>\n  li.addEventListener('click', handler)\n);\n\n// ✅ Event delegation -- one listener\ndocument.querySelector('#list')\n  .addEventListener('click', (e) => {\n    const item = e.target.closest('li');\n    if (!item) return;\n    console.log('clicked:', item.dataset.id);\n  });" },
  { q:"What is the difference between call, apply, and bind?", d:"Medium",
    a:"All three explicitly set <strong>this</strong>. <strong>call</strong>: invokes immediately, args listed separately. <strong>apply</strong>: invokes immediately, args as array. <strong>bind</strong>: returns a new function with this permanently bound — doesn't invoke immediately. Bind is used for callbacks, partial application, and React event handlers.",
    code:"function greet(greeting, punct) {\n  return `${greeting}, ${this.name}${punct}`;\n}\nconst user = { name: 'Alice' };\n\ngreet.call(user, 'Hello', '!');   // 'Hello, Alice!'\ngreet.apply(user, ['Hi', '?']);   // 'Hi, Alice?'\n\nconst sayHi = greet.bind(user, 'Hey');\nsayHi('.');                       // 'Hey, Alice.'" },
  { q:"What is debouncing vs throttling?", d:"Medium",
    a:"<strong>Debouncing</strong> delays execution until after a pause — the timer resets on every call. Use for: search input, window resize, save-as-you-type. <strong>Throttling</strong> limits execution to at most once per interval. Use for: scroll events, mouse moves, API rate limiting.",
    code:"// Debounce -- waits 300ms after LAST call\nconst debounce = (fn, ms) => {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), ms);\n  };\n};\n\n// Throttle -- runs at most once per 300ms\nconst throttle = (fn, ms) => {\n  let last = 0;\n  return (...args) => {\n    if (Date.now() - last >= ms) {\n      last = Date.now();\n      fn(...args);\n    }\n  };\n};\n\nwindow.addEventListener('resize', debounce(onResize, 300));\nwindow.addEventListener('scroll', throttle(onScroll, 100));" },
  { q:"What is prototypal inheritance?", d:"Hard",
    a:"Every JS object has an internal <strong>[[Prototype]]</strong> link to another object. Property lookups walk up the chain until found or null is reached. The class syntax is <strong>syntactic sugar</strong> over prototypal inheritance — no class-based OOP under the hood.",
    code:"// Prototypal\nconst animal = {\n  speak() { return `${this.name} makes a sound`; }\n};\nconst dog = Object.create(animal);\ndog.name = 'Rex';\ndog.bark = () => 'woof!';\n\ndog.speak(); // 'Rex makes a sound' (from prototype)\ndog.bark();  // 'woof!' (own property)\n\n// Class syntax (same thing underneath)\nclass Dog extends Animal {\n  bark() { return 'woof!'; }\n}" },
],
React: [
  { q:"What is the Virtual DOM and how does React use it?", d:"Medium",
    a:"The Virtual DOM is an in-memory JavaScript representation of the real DOM tree. When state changes, React creates a <strong>new virtual tree</strong>, diffs it against the previous one (reconciliation), and applies only the minimal real DOM changes needed. This batching and diffing avoids expensive full DOM re-renders.",
    code:"// React handles this automatically.\n// You write declarative UI:\nfunction Counter({ count }) {\n  return &lt;h1&gt;Count: {count}&lt;/h1&gt;;\n}\n// React diffs virtual trees and updates only\n// the text node inside &lt;h1&gt; if count changes." },
  { q:"What are React Hooks and why were they introduced?", d:"Easy",
    a:"Hooks (React 16.8) let <strong>functional components</strong> use state, lifecycle methods, context, and refs — without class components. They make logic <strong>reusable</strong> via custom hooks, eliminate the complexity of this bindings, HOC/render prop nesting, and lifecycle method duplication.",
    code:"function UserProfile({ userId }) {\n  const [user, setUser]     = useState(null);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n    fetchUser(userId).then(u => {\n      setUser(u);\n      setLoading(false);\n    });\n  }, [userId]);\n\n  if (loading) return &lt;Spinner /&gt;;\n  return &lt;div&gt;{user.name}&lt;/div&gt;;\n}" },
  { q:"What is the difference between useState and useReducer?", d:"Medium",
    a:"<strong>useState</strong> is ideal for simple, independent state values. <strong>useReducer</strong> is better when: next state depends on previous, multiple values change together, update logic is complex, or you need to test the logic in isolation (pure reducer functions).",
    code:"// useState -- simple\nconst [count, setCount] = useState(0);\n\n// useReducer -- complex state\nconst [state, dispatch] = useReducer((state, action) => {\n  switch (action.type) {\n    case 'INCREMENT': return { ...state, count: state.count + 1 };\n    case 'RESET':     return { count: 0, error: null };\n    case 'ERROR':     return { ...state, error: action.payload };\n    default: throw new Error('Unknown action');\n  }\n}, { count: 0, error: null });\n\ndispatch({ type: 'INCREMENT' });" },
  { q:"How does the useEffect dependency array work?", d:"Medium",
    a:"useEffect's dependency array controls <strong>when</strong> the effect re-runs. <strong>[]</strong>: run once on mount. <strong>[a, b]</strong>: re-run when a or b changes (shallow comparison). <strong>omitted</strong>: run after every render. Always return a cleanup function to cancel timers, subscriptions, or in-flight requests.",
    code:"// Once on mount, cleanup on unmount\nuseEffect(() => {\n  const sub = websocket.subscribe(onMessage);\n  return () => sub.unsubscribe();\n}, []);\n\n// Re-run when userId changes\nuseEffect(() => {\n  const controller = new AbortController();\n  fetch(`/api/user/${userId}`, { signal: controller.signal })\n    .then(r => r.json())\n    .then(setUser);\n  return () => controller.abort(); // cancel on cleanup\n}, [userId]);" },
  { q:"What is the difference between useMemo and useCallback?", d:"Hard",
    a:"<strong>useMemo</strong> memoizes the <em>result</em> of a computation — returns cached value until deps change. <strong>useCallback</strong> memoizes a <em>function reference</em> — prevents creating a new function on every render. Both exist to preserve referential equality so child components wrapped in React.memo don't re-render unnecessarily.",
    code:"// useMemo -- expensive calculation\nconst sortedList = useMemo(\n  () => [...items].sort((a, b) => a.score - b.score),\n  [items]  // only recalculates when items changes\n);\n\n// useCallback -- stable function reference\nconst handleDelete = useCallback(\n  (id) => dispatch({ type: 'DELETE', id }),\n  [dispatch]  // same fn reference unless dispatch changes\n);\n\n// Pair with React.memo on child\nconst Row = React.memo(({ onDelete }) => {\n  /* only re-renders if onDelete reference changes */\n});" },
  { q:"What is prop drilling and how do you solve it?", d:"Medium",
    a:"Prop drilling is threading props through multiple layers of components just to reach a distant child. Solutions: <strong>Context API</strong> for global data (theme, auth, locale), <strong>Zustand/Redux</strong> for complex app state, <strong>Component composition</strong> (passing children/JSX as props to skip intermediate layers).",
    code:"// Context API solution\nconst AuthCtx = createContext(null);\n\nfunction App() {\n  const auth = useAuth(); // from your auth hook\n  return (\n    &lt;AuthCtx.Provider value={auth}&gt;\n      &lt;Router /&gt; {/* no need to pass auth down */}\n    &lt;/AuthCtx.Provider&gt;\n  );\n}\n\n// Any descendant can access it\nfunction UserMenu() {\n  const { user, logout } = useContext(AuthCtx);\n  return &lt;button onClick={logout}&gt;{user.name}&lt;/button&gt;;\n}" },
  { q:"What is the key prop and why is it critical?", d:"Medium",
    a:"Keys help React identify which items in a list were added, removed, or reordered during reconciliation. Without stable keys, React reuses DOM nodes incorrectly — causing <strong>state bugs</strong> (inputs keeping wrong values, animations glitching). Never use array index as key when lists can be sorted or filtered.",
    code:"// ❌ Index as key -- causes bugs on reorder/delete\n{items.map((item, i) => &lt;Row key={i} {...item} /&gt;)}\n\n// ✅ Stable unique ID from data\n{items.map(item => &lt;Row key={item.id} {...item} /&gt;)}\n\n// ✅ Also good: stable string key\n{tabs.map(tab => &lt;Tab key={tab.slug} {...tab} /&gt;)}" },
  { q:"What is React.memo and when should you use it?", d:"Hard",
    a:"React.memo is a HOC that wraps a component and <strong>skips re-rendering</strong> if props haven't changed (shallow equality check). Use it for pure components that receive the same props often but render expensively. Don't overuse — the comparison itself has cost, and most components are fast enough without it.",
    code:"// Basic usage\nconst Avatar = React.memo(function Avatar({ src, name }) {\n  return &lt;img src={src} alt={name} /&gt;;\n});\n\n// Custom comparison (return true to SKIP re-render)\nconst Row = React.memo(\n  function Row({ user }) { return &lt;tr&gt;{user.name}&lt;/tr&gt;; },\n  (prev, next) => prev.user.id === next.user.id\n);" },
  { q:"What are controlled vs uncontrolled form components?", d:"Medium",
    a:"<strong>Controlled</strong>: React state is the single source of truth — input value is bound to state, onChange updates state. Enables real-time validation and conditional logic. <strong>Uncontrolled</strong>: DOM manages state, accessed via ref. Simpler for basic forms. File inputs must be uncontrolled.",
    code:"// Controlled -- React owns the state\nconst [email, setEmail] = useState('');\n&lt;input\n  value={email}\n  onChange={e => setEmail(e.target.value)}\n/&gt;\n\n// Uncontrolled -- DOM owns the state\nconst inputRef = useRef(null);\nconst handleSubmit = () =&gt; {\n  console.log(inputRef.current.value);\n};\n&lt;input ref={inputRef} defaultValue=\"initial\" /&gt;" },
  { q:"What is code splitting and React.lazy?", d:"Medium",
    a:"Code splitting breaks the JS bundle into smaller chunks loaded on demand — reducing initial bundle size and improving load time. <strong>React.lazy</strong> wraps a dynamic import and makes it work with <strong>Suspense</strong>. The component's code only downloads when first rendered.",
    code:"import { lazy, Suspense } from 'react';\n\n// Only downloaded when rendered\nconst Dashboard = lazy(() => import('./Dashboard'));\nconst Settings  = lazy(() => import('./Settings'));\n\nfunction App() {\n  return (\n    &lt;Suspense fallback={&lt;PageSpinner /&gt;}&gt;\n      {page === 'dashboard' && &lt;Dashboard /&gt;}\n      {page === 'settings'  && &lt;Settings  /&gt;}\n    &lt;/Suspense&gt;\n  );\n}" },
  { q:"What is the React reconciliation algorithm?", d:"Hard",
    a:"React's diffing algorithm computes minimal DOM updates in <strong>O(n)</strong> time (vs naive O(n³)). Rules: elements of different types produce entirely new trees. Same-type elements update only changed attributes. Lists use <strong>keys</strong> to match old/new items and avoid unnecessary unmounts/remounts.",
    code:"// React reconciles these efficiently:\n// Before:\n&lt;ul&gt;\n  &lt;li key=\"a\"&gt;A&lt;/li&gt;\n  &lt;li key=\"b\"&gt;B&lt;/li&gt;\n&lt;/ul&gt;\n\n// After (item added at top):\n&lt;ul&gt;\n  &lt;li key=\"c\"&gt;C&lt;/li&gt;  {/* new -- mounted */}\n  &lt;li key=\"a\"&gt;A&lt;/li&gt;  {/* moved -- not remounted */}\n  &lt;li key=\"b\"&gt;B&lt;/li&gt;  {/* moved -- not remounted */}\n&lt;/ul&gt;" },
  { q:"What are React Portals?", d:"Hard",
    a:"Portals render a component's output into a <strong>different DOM node</strong> than its parent — while keeping it in the React component tree (events still bubble through React tree). Essential for modals, tooltips, and dropdowns that need to escape overflow:hidden or z-index constraints.",
    code:"import { createPortal } from 'react-dom';\n\nfunction Modal({ isOpen, children }) {\n  if (!isOpen) return null;\n  return createPortal(\n    &lt;div className=\"modal-overlay\"&gt;\n      &lt;div className=\"modal-box\"&gt;\n        {children}\n      &lt;/div&gt;\n    &lt;/div&gt;,\n    document.getElementById('modal-root') // renders here\n  );\n}\n// Even though it renders in #modal-root,\n// events bubble to App in the React tree" },
],
};

let activeTab = 'HTML';
let activeFilter = 'all';
let expanded = new Set();
let viewed = new Set();

function tabClass(t) {
  const map = { HTML:'active-html', CSS:'active-css', JavaScript:'active-js', React:'active-react' };
  return map[t] || '';
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t => {
    const isActive = t === activeTab;
    return `<button class="tab${isActive ? ' '+tabClass(t) : ''}" onclick="setTab('${t}')">
      <span class="dot" style="background:${COLORS[t]}"></span>
      ${t}
      <span class="cnt">${DATA[t].length}</span>
    </button>`;
  }).join('');
}

function setTab(t) {
  activeTab = t;
  expanded.clear();
  renderTabs();
  renderCards();
  updateSection();
}

function setFilter(f) {
  activeFilter = f;
  ['all','Easy','Medium','Hard'].forEach(k => {
    const el = document.getElementById(`f-${k}`);
    if(el) el.classList.toggle('inactive', k !== f);
  });
  renderCards();
}

function updateSection() {
  const dot = document.getElementById('section-dot');
  const title = document.getElementById('section-title');
  if(dot) dot.style.background = COLORS[activeTab];
  if(title) title.textContent = activeTab;
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const items = DATA[activeTab].filter(item => {
    const matchSearch = !q || item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q);
    const matchFilter = activeFilter === 'all' || item.d === activeFilter;
    return matchSearch && matchFilter;
  });

  const container = document.getElementById('cards');
  const emptyEl   = document.getElementById('empty');
  const countEl   = document.getElementById('section-count');

  if(countEl) countEl.textContent = `${items.length} question${items.length !== 1 ? 's' : ''}`;

  if(!items.length) {
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  container.innerHTML = items.map((item, i) => {
    const key = `${activeTab}-${i}`;
    const isOpen = expanded.has(key);
    const diffClass = item.d === 'Easy' ? 'diff-easy' : item.d === 'Medium' ? 'diff-med' : 'diff-hard';
    const openClass = isOpen ? `open-${activeTab.toLowerCase().replace('javascript','js')}` : '';
    const delay = `animation-delay:${i * 0.04}s`;

    return `<div class="qcard${isOpen ? ' expanded ' + openClass : ''}" style="${delay}" id="card-${key}">
      <div class="qheader" onclick="toggle('${key}')">
        <div class="qnum">${String(i+1).padStart(2,'0')}</div>
        <div class="qtitle">${item.q}</div>
        <div class="qmeta">
          <span class="diff ${diffClass}">${item.d}</span>
          <div class="chevron">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      ${isOpen ? `<div class="qbody">
        <div class="answer-text">${item.a}</div>
        ${item.code ? `<div class="code-block">
          <div class="code-header">
            <span class="code-lang">code example</span>
            <button class="copy-btn" onclick="copyCode(event, '${key}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              copy
            </button>
          </div>
          <pre id="code-${key}">${item.code}</pre>
        </div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggle(key) {
  if(expanded.has(key)) {
    expanded.delete(key);
  } else {
    expanded.add(key);
    viewed.add(key);
    updateViewedCount();
  }
  renderCards();
  updateProgress();
}

function updateViewedCount() {
  const el = document.getElementById('viewed-count');
  if(el) el.textContent = viewed.size;
}

function updateProgress() {
  const total = Object.values(DATA).reduce((acc, arr) => acc + arr.length, 0);
  const pct = Math.round((viewed.size / total) * 100);
  const el = document.getElementById('progress');
  if(el) el.style.width = pct + '%';
}

function copyCode(event, key) {
  event.stopPropagation();
  const pre = document.getElementById(`code-${key}`);
  if(!pre) return;
  const text = pre.textContent
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.currentTarget;
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg> copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> copy`;
    }, 2000);
  });
}

document.getElementById('search').addEventListener('input', () => {
  expanded.clear();
  renderCards();
});

// Init
setFilter('all');
renderTabs();
updateSection();
renderCards();

// Update section count
const countEl = document.getElementById('section-count');
if(countEl) countEl.textContent = `${DATA[activeTab].length} questions`;
</script>
</body>
</html>
