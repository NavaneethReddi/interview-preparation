  { q:"What is a type assertion in TypeScript?", d:"Medium",
    a:"Type assertions tell the compiler to treat a value as a specific type — 'trust me, I know better'. Use <strong>as Type</strong> syntax. Use sparingly — assertions bypass type safety. Prefer type guards and proper typing instead.",
    code:"// as assertion\nconst el = document.getElementById('app') as HTMLDivElement;\nel.style.backgroundColor = 'red';\n\n// Non-null assertion (!)\nconst el2 = document.getElementById('app')!;\nel2.style.color = 'blue'; // assumes not null\n\n// Without assertion\nconst el3 = document.getElementById('app');\n// el3.style... ❌ might be null" },
  { q:"What are enums in TypeScript?", d:"Medium",
    a:"Enums define sets of named constants. <strong>Numeric enums</strong> auto-increment. <strong>String enums</strong> have explicit values. <strong>Const enums</strong> are inlined at compile time. Prefer union types for most cases — simpler and tree-shakeable.",
    code:"// Numeric\nenum Direction { Up, Down, Left, Right } // 0,1,2,3\n\n// String (more debuggable)\nenum Status { Active = 'ACTIVE', Inactive = 'INACTIVE' }\n\n// Const (no runtime overhead)\nconst enum Size { Small = 1, Medium = 2, Large = 3 }\n\n// Prefer union type\ntype Dir = 'up' | 'down' | 'left' | 'right';" },
  { q:"What are template literal types?", d:"Hard",
    a:"Template literal types construct string union types using template syntax — enabling type-safe string manipulation. Combined with mapped types, they power sophisticated utilities like extracting route params or event names.",
    code:"type Color = 'red' | 'blue';\ntype Shade = 'light' | 'dark';\ntype Variant = `${Shade}-${Color}`;\n// 'light-red' | 'light-blue' | 'dark-red' | 'dark-blue'\n\ntype EventName = 'click' | 'focus' | 'blur';\ntype Handler = `on${Capitalize<EventName>}`;\n// 'onClick' | 'onFocus' | 'onBlur'" },
  { q:"What is the satisfies operator?", d:"Hard",
    a:"<strong>satisfies</strong> (TS 4.9) validates that a value matches a type without widening the inferred type. Unlike a type annotation (which widens), satisfies lets you keep the precise inferred type while still checking constraints.",
    code:"type Palette = Record<'red'|'blue', string | number[]>;\n\n// annotation: loses specific type\nconst p1: Palette = { red: [255,0,0], blue: '#00f' };\np1.red; // string | number[] -- too wide\n\n// satisfies: validates AND preserves\nconst p2 = { red: [255,0,0], blue: '#00f' } satisfies Palette;\np2.red;  // number[] -- preserved!\np2.blue; // string -- preserved!" },
  { q:"What are discriminated unions?", d:"Medium",
    a:"A discriminated union has a <strong>common literal property</strong> (the discriminant) that TypeScript uses in switch/if to narrow the type — enabling exhaustive type checking with zero runtime overhead.",
    code:"type State =\n  | { status: 'loading' }\n  | { status: 'success'; data: User[] }\n  | { status: 'error';   message: string };\n\nfunction render(state: State) {\n  switch (state.status) {\n    case 'loading':  return &lt;Spinner /&gt;;\n    case 'success':  return &lt;List data={state.data} /&gt;;\n    case 'error':    return &lt;Error msg={state.message} /&gt;;\n    default:\n      const _: never = state; // exhaustiveness check\n  }\n}" },
  { q:"What are declaration files (.d.ts)?", d:"Hard",
    a:"Declaration files contain only <strong>type information</strong> — no runtime code. They describe the shape of JS modules to TypeScript. <strong>@types/*</strong> npm packages provide declarations for popular JS libraries.",
    code:"// myLib.d.ts\ndeclare module 'my-lib' {\n  export interface Config { apiKey: string; timeout?: number; }\n  export function init(config: Config): void;\n  export default class Client {\n    constructor(config: Config);\n    get(path: string): Promise<unknown>;\n  }\n}\n\n// Module augmentation\ndeclare module 'express' {\n  interface Request { user?: { id: string; role: string }; }\n}" },
  { q:"What are function overloads?", d:"Hard",
    a:"Function overloads declare multiple signatures for different input/output combinations — TypeScript picks the correct one based on the call. The implementation signature handles all cases but isn't externally callable.",
    code:"function process(x: string): string;\nfunction process(x: number): number;\nfunction process(x: string[]): string[];\n\n// Implementation\nfunction process(x: string | number | string[]) {\n  if (typeof x === 'string') return x.toUpperCase();\n  if (typeof x === 'number') return x * 2;\n  return x.map(s => s.toUpperCase());\n}\n\nprocess('hi');      // string\nprocess(42);        // number\nprocess(true);      // ❌ no matching overload" },
  { q:"What is the readonly modifier?", d:"Easy",
    a:"<strong>readonly</strong> prevents property reassignment after initialization — compile-time only check. Works on object properties and array types. Combine with Object.freeze() for runtime immutability.",
    code:"interface Config {\n  readonly apiUrl: string;\n  name: string;\n}\nconst config: Config = { apiUrl: '/api', name: 'app' };\nconfig.apiUrl = '/other'; // ❌ readonly\nconfig.name = 'other';   // ✅\n\nconst nums: readonly number[] = [1,2,3];\nnums.push(4); // ❌\n\ntype ImmutableUser = Readonly<User>;" },
  { q:"What are index signatures?", d:"Medium",
    a:"Index signatures describe types for objects with <strong>dynamic property names</strong> — you know the value type but not the keys. The key type must be string, number, or symbol. Use <strong>Record</strong> as a cleaner alternative.",
    code:"// Index signature\ninterface StringDict { [key: string]: string; }\n\n// Record utility (cleaner)\ntype CountMap = Record<string, number>;\nconst counts: CountMap = {};\ncounts['apple']  = 5;\ncounts['banana'] = 3;\n\n// Generic API routes\ntype Routes = Record<string, { method: 'GET'|'POST'; auth: boolean }>;\nconst routes: Routes = {\n  '/users': { method: 'GET', auth: false },\n  '/admin': { method: 'POST', auth: true },\n};" },
  { q:"What is module augmentation?", d:"Hard",
    a:"Module augmentation lets you <strong>add new declarations to an existing module</strong> — extending Express types, adding global properties, or enhancing third-party libraries without modifying source files.",
    code:"// Extend Express Request\nimport 'express';\ndeclare module 'express-serve-static-core' {\n  interface Request {\n    user?: { id: string; role: 'admin' | 'user' };\n  }\n}\n// Now: req.user?.id works in all route handlers\n\n// Augment global scope\ndeclare global {\n  interface String { toTitleCase(): string; }\n}\nString.prototype.toTitleCase = function() {\n  return this.replace(/\\b\\w/g, c => c.toUpperCase());\n};" },
,
TypeScript: [
  { q:"What is TypeScript and why use it over JavaScript?", d:"Easy",
    a:"TypeScript is a <strong>typed superset of JavaScript</strong> that compiles to plain JS. Benefits: catch type errors at compile-time instead of runtime, better IDE autocompletion, explicit contracts via interfaces/types, safer refactoring. TypeScript doesn't change runtime behavior — it's purely a development tool.",
    code:"// JavaScript -- bug caught at runtime\nfunction add(a, b) { return a + b; }\nadd('5', 3);  // '53' -- silent bug!\n\n// TypeScript -- bug caught at compile-time\nfunction add(a: number, b: number): number {\n  return a + b;\n}\nadd('5', 3);  // ❌ Error: Argument of type\n              // 'string' is not assignable to 'number'" },
  { q:"What is the difference between interface and type?", d:"Medium",
    a:"Both define shapes of objects. <strong>interface</strong>: extendable via extends and declaration merging (multiple declarations auto-merge). <strong>type</strong>: more flexible — supports unions, intersections, mapped types, conditional types. Use interface for public API shapes; type for complex type manipulations and unions.",
    code:"// Interface -- extendable, mergeable\ninterface User {\n  id: number;\n  name: string;\n}\ninterface User { email: string; } // merges!\n\n// Type -- flexible, no merging\ntype ID = string | number;\ntype Status = 'active' | 'inactive' | 'pending';\ntype ApiResponse<T> = {\n  data: T;\n  status: number;\n  error?: string;\n};\n\n// Intersection\ntype AdminUser = User & { permissions: string[]; };" },
  { q:"What are generics in TypeScript?", d:"Medium",
    a:"Generics create <strong>reusable, type-safe components</strong> that work with multiple types. They act as type parameters — you pass the type when calling. Essential for utility functions, data structures, API wrappers, and React components that need to be polymorphic.",
    code:"// Generic function\nfunction first<T>(arr: T[]): T | undefined {\n  return arr[0];\n}\nfirst([1, 2, 3]);    // returns: number\nfirst(['a', 'b']);   // returns: string\n\n// Generic with constraint\nfunction getProperty<T, K extends keyof T>(obj: T, key: K): T[K] {\n  return obj[key];\n}\n\n// Generic React component\nfunction List<T extends { id: string }>(\n  { items, renderItem }: {\n    items: T[];\n    renderItem: (item: T) => React.ReactNode;\n  }\n) {\n  return &lt;ul&gt;{items.map(item => renderItem(item))}&lt;/ul&gt;;\n}" },
  { q:"What are union and intersection types?", d:"Medium",
    a:"<strong>Union (|)</strong>: a value can be one of several types — use type narrowing to determine which. <strong>Intersection (&)</strong>: a value must satisfy ALL types simultaneously — combines properties. Unions model 'or' relationships; intersections model 'and' / composition.",
    code:"// Union -- one OR another\ntype ID = string | number;\ntype Status = 'loading' | 'success' | 'error';\n\nfunction format(id: ID): string {\n  if (typeof id === 'string') return id.toUpperCase();\n  return id.toString(); // narrowed to number\n}\n\n// Intersection -- combines types\ntype Timestamped = { createdAt: Date; updatedAt: Date; };\ntype Identifiable = { id: string; };\ntype Entity = Timestamped & Identifiable;\n\n// Discriminated union (type-safe switch)\ntype Result =\n  | { status: 'ok';    data: User  }\n  | { status: 'error'; message: string };" },
  { q:"What is 'any' vs 'unknown' in TypeScript?", d:"Medium",
    a:"<strong>any</strong>: opts out of type checking entirely — assignments to/from any are always allowed. Defeats the purpose of TypeScript. <strong>unknown</strong>: type-safe alternative — you must narrow the type before using it. Prefer unknown for values you don't know the type of (API responses, error objects).",
    code:"// any: dangerous -- no checks\nlet x: any = 'hello';\nx.foo.bar.baz; // ✅ no error, will crash at runtime\n\n// unknown: safe -- must narrow first\nlet y: unknown = getApiResponse();\ny.foo;                    // ❌ Error: can't access property\n\nif (typeof y === 'string') {\n  y.toUpperCase();        // ✅ narrowed to string\n}\n\n// Error handling pattern\ntry {\n  doSomething();\n} catch (err: unknown) {\n  if (err instanceof Error) {\n    console.error(err.message); // safe\n  }\n}" },
  { q:"What are TypeScript utility types?", d:"Medium",
    a:"TypeScript ships built-in generic types that transform existing types. <strong>Partial</strong> makes all properties optional. <strong>Required</strong> makes all required. <strong>Pick</strong> selects properties. <strong>Omit</strong> excludes properties. <strong>Readonly</strong> prevents mutation. <strong>Record</strong> creates key-value maps. Essential for reducing boilerplate.",
    code:"interface User {\n  id: number; name: string; email: string; role: string;\n}\n\n// Partial: all optional (good for patch/update)\ntype UpdateUser = Partial<User>;\n\n// Pick: select subset\ntype UserPreview = Pick<User, 'id' | 'name'>;\n\n// Omit: exclude properties\ntype NewUser = Omit<User, 'id'>;\n\n// Record: typed dictionary\ntype RoleMap = Record<string, User[]>;\n\n// ReturnType: extract function return type\ntype R = ReturnType<typeof fetchUser>;\n\n// Required: all props required (removes optional)\ntype StrictUser = Required<User>;" },
  { q:"What is type narrowing?", d:"Medium",
    a:"Type narrowing refines a broader type to a more specific one inside a conditional block. TypeScript tracks control flow — after an if/switch/guard, it knows the precise type. Key narrowing techniques: typeof, instanceof, in operator, equality checks, and <strong>type predicates</strong>.",
    code:"function processInput(value: string | number | boolean) {\n  if (typeof value === 'string') {\n    return value.toUpperCase();  // string\n  }\n  if (typeof value === 'number') {\n    return value.toFixed(2);     // number\n  }\n  return value;                  // boolean\n}\n\n// Type predicate\nfunction isUser(obj: unknown): obj is User {\n  return typeof obj === 'object'\n    && obj !== null\n    && 'id' in obj\n    && 'name' in obj;\n}\n\n// instanceof narrowing\nif (err instanceof NetworkError) {\n  // err is NetworkError here\n}" },
  { q:"What are decorators in TypeScript?", d:"Hard",
    a:"Decorators are a <strong>meta-programming</strong> syntax to annotate and modify classes, methods, properties, and parameters. Currently a Stage 3 proposal; TypeScript supports them experimentally. Widely used in Angular and NestJS for dependency injection, routing, and validation.",
    code:"// Class decorator\nfunction sealed(constructor: Function) {\n  Object.seal(constructor);\n  Object.seal(constructor.prototype);\n}\n\n// Method decorator\nfunction log(_target: any, key: string, descriptor: PropertyDescriptor) {\n  const original = descriptor.value;\n  descriptor.value = function(...args: unknown[]) {\n    console.log(`Calling ${key} with`, args);\n    return original.apply(this, args);\n  };\n  return descriptor;\n}\n\n@sealed\nclass UserService {\n  @log\n  getUser(id: number) {\n    return fetch(`/api/users/${id}`);\n  }\n}" },
  { q:"What is the difference between never, void, and undefined?", d:"Hard",
    a:"<strong>void</strong>: function returns nothing (implicitly returns undefined). <strong>undefined</strong>: explicit undefined value. <strong>never</strong>: function never returns — it either throws or runs forever. TypeScript uses never for exhaustiveness checks — if you handle all union cases, the else branch is never.",
    code:"// void: no meaningful return\nfunction log(msg: string): void {\n  console.log(msg);\n  // returns undefined implicitly\n}\n\n// never: truly never returns\nfunction fail(msg: string): never {\n  throw new Error(msg);\n}\n\nfunction infinite(): never {\n  while (true) {}\n}\n\n// Exhaustiveness check with never\ntype Shape = 'circle' | 'square' | 'triangle';\nfunction area(s: Shape): number {\n  switch (s) {\n    case 'circle':   return Math.PI;\n    case 'square':   return 1;\n    case 'triangle': return 0.5;\n    default: const _: never = s; // error if case missed\n  }\n}" },
  { q:"What are conditional types and mapped types?", d:"Hard",
    a:"<strong>Conditional types</strong> act like ternaries at the type level: T extends U ? X : Y. <strong>Mapped types</strong> create new types by iterating over keys. Together they power TypeScript's built-in utilities (Partial, Required, Readonly). The infer keyword extracts types from within conditionals.",
    code:"// Conditional type\ntype IsString<T> = T extends string ? true : false;\ntype A = IsString<'hi'>;    // true\ntype B = IsString<42>;      // false\n\n// infer: extract inner type\ntype ReturnType<T> = T extends (...args: any) => infer R ? R : never;\ntype Unwrap<T>    = T extends Promise<infer U> ? U : T;\n\n// Mapped type\ntype Readonly<T> = {\n  readonly [K in keyof T]: T[K];\n};\ntype Nullable<T> = {\n  [K in keyof T]: T[K] | null;\n};\n\n// Conditional + mapped\ntype NonNullableProps<T> = {\n  [K in keyof T as T[K] extends null | undefined ? never : K]: T[K];\n};" },

let activeTab = 'HTML';
let activeFilter = 'all';
let expanded = new Set();
let viewed = new Set();

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeButton(next);
  // Re-render to update colors
  renderTabs();
  updateSection();
}

function updateThemeButton(theme) {
  const icon  = document.getElementById('theme-icon');
  const label = document.getElementById('theme-label');
  if (theme === 'dark') {
    icon.textContent  = '🌙';
    label.textContent = 'Dark';
  } else {
    icon.textContent  = '☀️';
    label.textContent = 'Light';
  }
}

function tabClass(t) {
  const map = { HTML:'active-html', CSS:'active-css', JavaScript:'active-js', React:'active-react', TypeScript:'active-ts' };
  return map[t] || '';
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  if (!bar) return;
  const total = Object.values(DATA).reduce((acc, arr) => acc + arr.length, 0);
  bar.innerHTML = TABS.map(t => `
    <div class="stat">
      <span class="stat-num" style="color:${getColor(t)}">${DATA[t].length}</span>
      <span class="stat-lbl">${t}</span>
    </div>
  `).join('') + `
    <div class="stat" style="margin-left:auto;">
      <span class="stat-num" id="viewed-count" style="color:var(--accent)">0</span>
      <span class="stat-lbl">Viewed</span>
    </div>
  `;
}

function renderTabs() {
  document.getElementById('tabs').innerHTML = TABS.map(t => {
    const isActive = t === activeTab;
    return `<button class="tab${isActive ? ' '+tabClass(t) : ''}" onclick="setTab('${t}')">
      <span class="dot" style="background:${getColor(t)}"></span>
      ${t}
      <span class="cnt">${DATA[t].length}</span>
    </button>`;
  }).join('');
}

function setTab(t) {
  activeTab = t;
  expanded.clear();
  renderTabs();
  renderCards();
  updateSection();
}

function setFilter(f) {
  activeFilter = f;
  ['all','Easy','Medium','Hard'].forEach(k => {
    const el = document.getElementById(`f-${k}`);
    if(el) el.classList.toggle('inactive', k !== f);
  });
  renderCards();
}

function updateSection() {
  const dot   = document.getElementById('section-dot');
  const title = document.getElementById('section-title');
  if(dot)   dot.style.background = getColor(activeTab);
  if(title) title.textContent    = activeTab;
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const items = DATA[activeTab].filter(item => {
    const matchSearch = !q || item.q.toLowerCase().includes(q) || item.a.toLowerCase().includes(q);
    const matchFilter = activeFilter === 'all' || item.d === activeFilter;
    return matchSearch && matchFilter;
  });

  const container = document.getElementById('cards');
  const emptyEl   = document.getElementById('empty');
  const countEl   = document.getElementById('section-count');

  if(countEl) countEl.textContent = `${items.length} question${items.length !== 1 ? 's' : ''}`;

  if(!items.length) {
    container.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  const tabKey = activeTab.toLowerCase().replace('javascript','js').replace('typescript','ts');

  container.innerHTML = items.map((item, i) => {
    const key = `${activeTab}-${i}`;
    const isOpen = expanded.has(key);
    const diffClass = item.d === 'Easy' ? 'diff-easy' : item.d === 'Medium' ? 'diff-med' : 'diff-hard';
    const openClass = isOpen ? `open-${tabKey}` : '';
    const delay = `animation-delay:${i * 0.035}s`;

    return `<div class="qcard${isOpen ? ' expanded ' + openClass : ''}" style="${delay}" id="card-${key}">
      <div class="qheader" onclick="toggle('${key}')">
        <div class="qnum">${String(i+1).padStart(2,'0')}</div>
        <div class="qtitle">${item.q}</div>
        <div class="qmeta">
          <span class="diff ${diffClass}">${item.d}</span>
          <div class="chevron">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
          </div>
        </div>
      </div>
      ${isOpen ? `<div class="qbody">
        <div class="answer-text">${item.a}</div>
        ${item.code ? `<div class="code-block">
          <div class="code-header">
            <span class="code-lang">code example</span>
            <button class="copy-btn" onclick="copyCode(event, '${key}')">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
              copy
            </button>
          </div>
          <pre id="code-${key}">${item.code}</pre>
        </div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggle(key) {
  if(expanded.has(key)) {
    expanded.delete(key);
  } else {
    expanded.add(key);
    viewed.add(key);
    updateViewedCount();
  }
  renderCards();
  updateProgress();
}

function updateViewedCount() {
  const el = document.getElementById('viewed-count');
  if(el) el.textContent = viewed.size;
}

function updateProgress() {
  const total = Object.values(DATA).reduce((acc, arr) => acc + arr.length, 0);
  const pct = Math.round((viewed.size / total) * 100);
  const el = document.getElementById('progress');
  const txt = document.getElementById('progress-text');
  if(el)  el.style.width = pct + '%';
  if(txt) txt.textContent = `${viewed.size} / ${total} viewed`;
}

function copyCode(event, key) {
  event.stopPropagation();
  const pre = document.getElementById(`code-${key}`);
  if(!pre) return;
  const text = pre.textContent
    .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&');
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.currentTarget;
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20,6 9,17 4,12"/></svg> copied!`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg> copy`;
    }, 2000);
  });
}

document.getElementById('search').addEventListener('input', () => {
  expanded.clear();
  renderCards();
});

// Init: restore saved theme preference
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeButton(savedTheme);

const total = Object.values(DATA).reduce((acc, arr) => acc + arr.length, 0);
document.getElementById('progress-text').textContent = `0 / ${total} viewed`;

setFilter('all');
renderStats();
renderTabs();
updateSection();
renderCards();
</script>
</body>
</html>
