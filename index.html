<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frontend Interview Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* Light mode (default) */
    --bg:         #f5f6fa;
    --bg-card:    #ffffff;
    --bg-hover:   #f0f2f8;
    --bg-code:    #1a1d27;
    --border:     rgba(0,0,0,0.07);
    --border-md:  rgba(0,0,0,0.13);
    --text:       #111318;
    --text-sub:   #4a5068;
    --text-dim:   #9097b0;
    --accent:     #2563eb;
    --accent-dim: rgba(37,99,235,0.09);
    --accent-glow:rgba(37,99,235,0.22);
    --html:       #e85d1a;
    --html-dim:   rgba(232,93,26,0.10);
    --css:        #1e6fd9;
    --css-dim:    rgba(30,111,217,0.10);
    --js:         #c89b10;
    --js-dim:     rgba(200,155,16,0.10);
    --react:      #0794b8;
    --react-dim:  rgba(7,148,184,0.10);
    --ts:         #2563eb;
    --ts-dim:     rgba(37,99,235,0.10);
    --easy:       #16a34a;
    --easy-dim:   rgba(22,163,74,0.10);
    --med:        #d97706;
    --med-dim:    rgba(217,119,6,0.10);
    --hard:       #dc2626;
    --hard-dim:   rgba(220,38,38,0.10);
    --shadow-sm:  0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    --radius:     14px;
    --radius-sm:  9px;
    --font-head:  'Syne', sans-serif;
    --font-body:  'DM Sans', sans-serif;
    --font-mono:  'DM Mono', monospace;
    --grid-color: rgba(0,0,0,0.035);
  }

  [data-theme="dark"] {
    --bg:         #0c0e13;
    --bg-card:    #13161e;
    --bg-hover:   #1a1e2a;
    --bg-code:    #090b10;
    --border:     rgba(255,255,255,0.07);
    --border-md:  rgba(255,255,255,0.13);
    --text:       #edf0f7;
    --text-sub:   #8891aa;
    --text-dim:   #4f576e;
    --accent:     #5b8df5;
    --accent-dim: rgba(91,141,245,0.12);
    --accent-glow:rgba(91,141,245,0.28);
    --html:       #ff7444;
    --html-dim:   rgba(255,116,68,0.12);
    --css:        #5b9cf5;
    --css-dim:    rgba(91,156,245,0.12);
    --js:         #f7ca48;
    --js-dim:     rgba(247,202,72,0.12);
    --react:      #5dd3f3;
    --react-dim:  rgba(93,211,243,0.12);
    --ts:         #5b8df5;
    --ts-dim:     rgba(91,141,245,0.12);
    --easy:       #4ade80;
    --easy-dim:   rgba(74,222,128,0.12);
    --med:        #fb923c;
    --med-dim:    rgba(251,146,60,0.12);
    --hard:       #f87171;
    --hard-dim:   rgba(248,113,113,0.12);
    --shadow-sm:  0 1px 3px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.15);
    --shadow-md:  0 4px 16px rgba(0,0,0,0.35), 0 2px 6px rgba(0,0,0,0.20);
    --grid-color: rgba(255,255,255,0.025);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.25s, color 0.25s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap { max-width: 920px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* ── Header ── */
  header { padding: 52px 0 44px; }

  .header-top {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }

  .header-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-dim); border: 1px solid var(--accent-glow);
    border-radius: 20px; padding: 4px 14px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 18px;
  }
  .header-eyebrow span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.75); } }

  h1 {
    font-family: var(--font-head);
    font-size: clamp(32px, 5.5vw, 54px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.025em;
    margin-bottom: 14px;
  }

  h1 .gradient {
    background: linear-gradient(135deg, var(--accent) 0%, var(--react) 55%, var(--js) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-desc { color: var(--text-sub); font-size: 15.5px; max-width: 500px; line-height: 1.7; margin-bottom: 32px; }

  /* ── Theme toggle ── */
  .theme-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 20px; cursor: pointer;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-sub);
    transition: all 0.18s; user-select: none; flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .theme-toggle:hover { border-color: var(--border-md); color: var(--text); }
  .theme-toggle .toggle-icon { font-size: 14px; line-height: 1; }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 0; flex-wrap: wrap;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 36px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .stat {
    display: flex; flex-direction: column;
    padding: 18px 24px; flex: 1; min-width: 80px;
    position: relative;
  }
  .stat + .stat::before {
    content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
    width: 1px; background: var(--border);
  }
  .stat-num { font-family: var(--font-head); font-size: 24px; font-weight: 700; line-height: 1; }
  .stat-lbl { font-size: 10.5px; color: var(--text-dim); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 5px; }

  /* ── Controls ── */
  .controls { display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }

  .search-box { position: relative; }
  .search-box svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }
  .search-box input {
    width: 100%; padding: 12px 14px 12px 44px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: var(--font-body); font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow-sm);
  }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 5px; flex-wrap: wrap; }

  .tab {
    display: flex; align-items: center; gap: 7px;
    padding: 8px 16px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer;
    font-family: var(--font-head); font-size: 13px; font-weight: 600;
    color: var(--text-sub); transition: all 0.16s;
    user-select: none; box-shadow: var(--shadow-sm);
  }
  .tab:hover { border-color: var(--border-md); color: var(--text); background: var(--bg-hover); }
  .tab .dot { width: 7px; height: 7px; border-radius: 50%; }
  .tab .cnt { font-family: var(--font-mono); font-size: 10px; opacity: 0.55; }

  .tab.active-html { border-color: var(--html); background: var(--html-dim); color: var(--html); }
  .tab.active-css  { border-color: var(--css);  background: var(--css-dim);  color: var(--css); }
  .tab.active-js   { border-color: var(--js);   background: var(--js-dim);   color: var(--js); }
  .tab.active-react{ border-color: var(--react);background: var(--react-dim);color: var(--react); }
  .tab.active-ts   { border-color: var(--ts);   background: var(--ts-dim);   color: var(--ts); }

  /* ── Filter pills ── */
  .filters { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .filter-lbl { font-size: 11.5px; color: var(--text-dim); font-family: var(--font-mono); }

  .pill {
    padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 500; font-family: var(--font-mono);
    cursor: pointer; border: 1px solid transparent; transition: all 0.15s;
    user-select: none;
  }
  .pill-all  { background: var(--bg-hover); color: var(--text-sub); border-color: var(--border-md); }
  .pill-easy { background: var(--easy-dim); color: var(--easy); border-color: rgba(74,222,128,0.25); }
  .pill-med  { background: var(--med-dim);  color: var(--med);  border-color: rgba(251,146,60,0.25); }
  .pill-hard { background: var(--hard-dim); color: var(--hard); border-color: rgba(248,113,113,0.25); }
  .pill.inactive { opacity: 0.3; }
  .pill:hover { opacity: 1 !important; }

  /* ── Question cards ── */
  .cards { display: flex; flex-direction: column; gap: 7px; padding-bottom: 80px; }

  .qcard {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
    box-shadow: var(--shadow-sm);
  }
  .qcard:hover { border-color: var(--border-md); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .qcard.expanded { transform: none; }
  .qcard.open-html  { border-color: rgba(232,93,26,0.35); }
  .qcard.open-css   { border-color: rgba(30,111,217,0.35); }
  .qcard.open-js    { border-color: rgba(200,155,16,0.35); }
  .qcard.open-react { border-color: rgba(7,148,184,0.35); }
  .qcard.open-ts    { border-color: rgba(37,99,235,0.35); }
  [data-theme="dark"] .qcard.open-html  { border-color: rgba(255,116,68,0.35); }
  [data-theme="dark"] .qcard.open-css   { border-color: rgba(91,156,245,0.35); }
  [data-theme="dark"] .qcard.open-js    { border-color: rgba(247,202,72,0.35); }
  [data-theme="dark"] .qcard.open-react { border-color: rgba(93,211,243,0.35); }

  .qheader {
    display: flex; align-items: center; gap: 14px;
    padding: 15px 18px; cursor: pointer; user-select: none;
  }

  .qnum {
    min-width: 28px; height: 28px; border-radius: 8px;
    background: var(--bg-hover); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
    flex-shrink: 0;
  }

  .qtitle {
    flex: 1; font-size: 14px; font-weight: 500; line-height: 1.5;
    color: var(--text);
  }

  .qmeta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

  .diff {
    padding: 3px 10px; border-radius: 20px;
    font-family: var(--font-mono); font-size: 10px; font-weight: 500;
  }
  .diff-easy { background: var(--easy-dim); color: var(--easy); }
  .diff-med  { background: var(--med-dim);  color: var(--med);  }
  .diff-hard { background: var(--hard-dim); color: var(--hard); }

  .chevron {
    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
    border-radius: 7px; color: var(--text-dim);
    transition: transform 0.22s ease, background 0.15s;
  }
  .qcard.expanded .chevron { transform: rotate(180deg); }
  .qheader:hover .chevron { background: var(--bg-hover); color: var(--text-sub); }

  /* ── Answer body ── */
  .qbody {
    display: none;
    padding: 0 18px 18px 60px;
    border-top: 1px solid var(--border);
  }
  .qcard.expanded .qbody { display: block; }

  .answer-text {
    padding-top: 14px;
    font-size: 14px; color: var(--text-sub); line-height: 1.8;
  }

  .answer-text strong { color: var(--text); font-weight: 500; }

  .code-block {
    margin-top: 14px;
    background: var(--bg-code);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-sm);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .code-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
  }
  .code-lang { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 0.07em; text-transform: uppercase; }
  .copy-btn {
    display: flex; align-items: center; gap: 5px;
    font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.3);
    background: none; border: none; cursor: pointer; padding: 2px 7px;
    border-radius: 4px; transition: all 0.15s;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.65); }
  .copy-btn.copied { color: #4ade80; }

  pre {
    padding: 14px 16px; overflow-x: auto;
    font-family: var(--font-mono); font-size: 12.5px;
    color: #c9d1d9; line-height: 1.65;
    tab-size: 2;
  }

  .kw { color: #ff7b72; }
  .fn { color: #d2a8ff; }
  .st { color: #a5d6ff; }
  .cm { color: #8b949e; font-style: italic; }
  .nm { color: #79c0ff; }
  .op { color: #ff7b72; }

  /* ── Empty state ── */
  .empty {
    display: none; text-align: center; padding: 64px 24px;
    color: var(--text-dim);
  }
  .empty svg { margin-bottom: 16px; opacity: 0.3; }
  .empty p { font-size: 14px; }

  /* ── Progress bar ── */
  .progress-wrap {
    margin-bottom: 24px;
  }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 7px;
  }
  .progress-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  .progress-bar {
    height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, var(--accent), var(--react));
    transition: width 0.35s ease;
  }

  /* ── Section label ── */
  .section-label {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-label-left {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-head); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--text-sub);
  }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; }
  .section-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .qbody { padding-left: 18px; }
    .stats { gap: 0; }
    .stat { padding: 14px 16px; }
    h1 { font-size: 30px; }
    .header-top { flex-direction: column-reverse; }
    .theme-toggle { align-self: flex-end; }
  }

  /* ── Fade-in animation ── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .qcard { animation: fadeUp 0.22s ease both; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="header-top">
      <div>
        <div class="header-eyebrow"><span></span> Interview Prep Hub</div>
        <h1>Frontend <span class="gradient">Interview</span><br>Questions</h1>
        <p class="header-desc">Master the most asked questions across HTML, CSS, JavaScript, React, and TypeScript. Curated answers with real code examples.</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">
        <span class="toggle-icon" id="theme-icon">☀️</span>
        <span id="theme-label">Light</span>
      </button>
    </div>

    <div class="stats" id="stats-bar"></div>
  </header>

  <div class="controls">
    <div class="search-box">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search questions, answers, or topics..." autocomplete="off" />
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="filters">
      <span class="filter-lbl">Difficulty:</span>
      <span class="pill pill-all" id="f-all" onclick="setFilter('all')">All</span>
      <span class="pill pill-easy" id="f-Easy" onclick="setFilter('Easy')">Easy</span>
      <span class="pill pill-med"  id="f-Medium" onclick="setFilter('Medium')">Medium</span>
      <span class="pill pill-hard" id="f-Hard" onclick="setFilter('Hard')">Hard</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span class="progress-label">Progress</span>
      <span class="progress-label" id="progress-text">0 / 0 viewed</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  </div>

  <div class="section-label">
    <div class="section-label-left">
      <span class="section-dot" id="section-dot"></span>
      <span id="section-title">HTML</span>
    </div>
    <span class="section-count" id="section-count"></span>
  </div>

  <div class="cards" id="cards"></div>
  <div class="empty" id="empty">
    <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <p>No questions match your search.</p>
  </div>
</div>

<script>
const TABS = ['HTML','CSS','JavaScript','React','TypeScript'];
const COLORS = { HTML:'#e85d1a', CSS:'#1e6fd9', JavaScript:'#c89b10', React:'#0794b8', TypeScript:'#2563eb' };
const DARK_COLORS = { HTML:'#ff7444', CSS:'#5b9cf5', JavaScript:'#f7ca48', React:'#5dd3f3', TypeScript:'#5b8df5' };

function getColor(tab) {
  return document.documentElement.getAttribute('data-theme') === 'dark' ? DARK_COLORS[tab] : COLORS[tab];
}

const DATA = 
  { q:"What is the Shadow DOM?", d:"Medium",
    a:"The Shadow DOM is a <strong>scoped, encapsulated DOM subtree</strong> attached to an element — its styles and structure are isolated from the main document. Used internally by browsers for &lt;input&gt;, &lt;video&gt;, &lt;select&gt;. You can create shadow roots manually for Web Components to prevent style leakage.",
    code:"const host = document.querySelector('#card');\nconst shadow = host.attachShadow({ mode: 'open' });\n\nshadow.innerHTML = `\n  <style>\n    p { color: red; }  /* scoped to shadow only */\n  </style>\n  <p>Shadow content</p>\n`;\n// Styles here won't leak out; outer styles won't leak in" },
  { q:"What is the difference between localStorage, sessionStorage, and cookies?", d:"Medium",
    a:"<strong>localStorage</strong>: persists indefinitely, ~5MB, same-origin only, never sent to server. <strong>sessionStorage</strong>: cleared when tab closes, same limits. <strong>Cookies</strong>: sent with every HTTP request, ~4KB, can be scoped by path/domain, can be HTTP-only and Secure. Use cookies for auth tokens, localStorage for UI preferences.",
    code:"// localStorage -- survives browser restart\nlocalStorage.setItem('theme', 'dark');\nlocalStorage.getItem('theme');  // 'dark'\n\n// sessionStorage -- cleared on tab close\nsessionStorage.setItem('draft', JSON.stringify(form));\n\n// Cookie -- sent to server automatically\ndocument.cookie = 'token=abc; Path=/; Secure; SameSite=Strict';\n// Better: set HttpOnly cookies server-side via Set-Cookie header" },
  { q:"What is the &lt;picture&gt; element and srcset?", d:"Medium",
    a:"<strong>srcset</strong> on &lt;img&gt; provides multiple resolution variants — the browser picks the best one for the screen density. <strong>&lt;picture&gt;</strong> adds art direction — different crops at different viewport sizes. Together they eliminate sending oversized images to mobile devices.",
    code:"&lt;!-- srcset: resolution switching --&gt;\n&lt;img\n  src=\"hero-800.jpg\"\n  srcset=\"hero-400.jpg 400w, hero-800.jpg 800w, hero-1600.jpg 1600w\"\n  sizes=\"(max-width: 600px) 100vw, 50vw\"\n  alt=\"Hero\"\n/&gt;\n\n&lt;!-- picture: art direction --&gt;\n&lt;picture&gt;\n  &lt;source media=\"(max-width: 600px)\" srcset=\"hero-portrait.jpg\" /&gt;\n  &lt;source media=\"(min-width: 601px)\" srcset=\"hero-landscape.jpg\" /&gt;\n  &lt;img src=\"hero-landscape.jpg\" alt=\"Hero\" /&gt;\n&lt;/picture&gt;" },
  { q:"What are Web Components?", d:"Hard",
    a:"Web Components are browser-native APIs for creating <strong>reusable, encapsulated custom elements</strong> without a framework. They consist of: <strong>Custom Elements</strong> (define new HTML tags), <strong>Shadow DOM</strong> (scoped styles/DOM), and <strong>HTML Templates</strong> (&lt;template&gt;/&lt;slot&gt;).",
    code:"class MyCard extends HTMLElement {\n  constructor() {\n    super();\n    const shadow = this.attachShadow({ mode: 'open' });\n    shadow.innerHTML = `\n      <style>.card { padding: 16px; }</style>\n      <div class=\"card\"><slot name=\"title\"></slot><slot></slot></div>\n    `;\n  }\n}\ncustomElements.define('my-card', MyCard);\n// &lt;my-card&gt;&lt;h2 slot=\"title\"&gt;Hello&lt;/h2&gt;&lt;/my-card&gt;" },
  { q:"What is the difference between GET and POST in HTML forms?", d:"Easy",
    a:"<strong>GET</strong>: appends form data to the URL as query string — visible, bookmarkable, cacheable, limited length (~2000 chars). Use for search, filtering. <strong>POST</strong>: sends data in the request body — not in URL, supports larger payloads, not cached. Use for creating/updating data. POST is not inherently secure — always use HTTPS for both.",
    code:"&lt;!-- GET: data in URL -- good for search --&gt;\n&lt;form action=\"/search\" method=\"GET\"&gt;\n  &lt;input name=\"q\" type=\"text\" /&gt;\n  &lt;button type=\"submit\"&gt;Search&lt;/button&gt;\n  &lt;!-- submits to /search?q=value --&gt;\n&lt;/form&gt;\n\n&lt;!-- POST: data in body -- good for mutations --&gt;\n&lt;form action=\"/login\" method=\"POST\"&gt;\n  &lt;input name=\"email\" type=\"email\" /&gt;\n  &lt;input name=\"password\" type=\"password\" /&gt;\n&lt;/form&gt;" },
  { q:"What is Content Security Policy (CSP)?", d:"Hard",
    a:"CSP is an HTTP response header that tells browsers <strong>which content sources are trusted</strong> — scripts, styles, images, fonts, etc. It's the primary defense against XSS attacks by preventing inline scripts and limiting external resource origins.",
    code:"&lt;!-- Meta tag (limited support) --&gt;\n&lt;meta http-equiv=\"Content-Security-Policy\"\n  content=\"default-src 'self'; script-src 'self' cdn.example.com\" /&gt;\n\n// HTTP header (preferred):\nContent-Security-Policy:\n  default-src 'self';\n  script-src 'self' 'nonce-{RANDOM}';\n  style-src 'self' fonts.googleapis.com;\n  img-src 'self' data: https:;\n  report-uri /csp-report;" },
{
HTML: [
  { q:"What is the purpose of <!DOCTYPE html>?", d:"Easy",
    a:"It tells the browser which version of HTML the document uses. Without it, browsers enter <strong>quirks mode</strong> — a legacy rendering mode with inconsistent behavior across browsers. &lt;!DOCTYPE html&gt; triggers standards mode in all modern browsers.",
    code:"&lt;!-- Always the very first line of your HTML --&gt;\n&lt;!DOCTYPE html&gt;\n&lt;html lang=\"en\"&gt;\n  &lt;head&gt;...&lt;/head&gt;\n&lt;/html&gt;" },
  { q:"What is semantic HTML and why does it matter?", d:"Easy",
    a:"Semantic HTML uses meaningful tags that describe the <strong>purpose</strong> of content — &lt;header&gt;, &lt;nav&gt;, &lt;main&gt;, &lt;article&gt;, &lt;section&gt;, &lt;footer&gt; — rather than generic &lt;div&gt; and &lt;span&gt;. Benefits: accessibility (screen readers understand structure), SEO (search engines weight semantic content), and maintainability.",
    code:"&lt;!-- Non-semantic (avoid) --&gt;\n&lt;div class=\"header\"&gt;\n  &lt;div class=\"nav\"&gt;...&lt;/div&gt;\n&lt;/div&gt;\n\n&lt;!-- Semantic (prefer) --&gt;\n&lt;header&gt;\n  &lt;nav&gt;...&lt;/nav&gt;\n&lt;/header&gt;\n&lt;main&gt;\n  &lt;article&gt;...&lt;/article&gt;\n  &lt;aside&gt;...&lt;/aside&gt;\n&lt;/main&gt;" },
  { q:"What is the difference between &lt;script&gt;, &lt;script async&gt;, and &lt;script defer&gt;?", d:"Medium",
    a:"<strong>&lt;script&gt;</strong> blocks HTML parsing until the script downloads and executes. <strong>async</strong> downloads in parallel and runs immediately when ready — order not guaranteed. <strong>defer</strong> downloads in parallel but waits until HTML is fully parsed — order is preserved. Use defer for most scripts.",
    code:"&lt;!-- Blocks rendering -- avoid --&gt;\n&lt;script src=\"app.js\"&gt;&lt;/script&gt;\n\n&lt;!-- Parallel download, runs immediately (unordered) --&gt;\n&lt;script src=\"analytics.js\" async&gt;&lt;/script&gt;\n\n&lt;!-- Parallel download, runs after DOM parsed (ordered) --&gt;\n&lt;script src=\"app.js\" defer&gt;&lt;/script&gt;" },
  { q:"What is the difference between id and class attributes?", d:"Easy",
    a:"An <strong>id</strong> must be unique per page — only one element can have a given id. A <strong>class</strong> can be reused on unlimited elements. Use id for unique targets (anchor links, JS hooks) and class for styling reusable groups. In CSS, id (#) has higher specificity than class (.).",
    code:"&lt;!-- id: unique, higher specificity --&gt;\n&lt;header id=\"main-nav\"&gt;...&lt;/header&gt;\n\n&lt;!-- class: reusable, lower specificity --&gt;\n&lt;div class=\"card featured\"&gt;...&lt;/div&gt;\n&lt;div class=\"card\"&gt;...&lt;/div&gt;" },
  { q:"What are data-* attributes?", d:"Easy",
    a:"Custom attributes that store extra data on HTML elements without non-standard attributes. They're accessible in JS via <strong>element.dataset</strong> and can be styled in CSS with attribute selectors. Great for passing config to JS components without separate JS variables.",
    code:"&lt;button data-user-id=\"42\" data-role=\"admin\" data-confirm=\"true\"&gt;\n  Delete Account\n&lt;/button&gt;\n\n&lt;script&gt;\n  const btn = document.querySelector('button');\n  btn.dataset.userId   // '42'\n  btn.dataset.role     // 'admin'\n  btn.dataset.confirm  // 'true'\n&lt;/script&gt;" },
  { q:"What is the difference between &lt;strong&gt;, &lt;b&gt;, &lt;em&gt;, and &lt;i&gt;?", d:"Easy",
    a:"<strong>&lt;strong&gt;</strong> = important content (semantic — screen readers announce it). <strong>&lt;b&gt;</strong> = bold for stylistic reasons only (no semantic meaning). <strong>&lt;em&gt;</strong> = stressed emphasis that changes meaning (semantic). <strong>&lt;i&gt;</strong> = italic without emphasis — for technical terms, foreign words, thoughts.",
    code:"&lt;p&gt;This is &lt;strong&gt;critically important&lt;/strong&gt;.&lt;/p&gt;\n&lt;p&gt;The word &lt;em&gt;must&lt;/em&gt; be there.&lt;/p&gt;\n&lt;p&gt;Press the &lt;b&gt;Start&lt;/b&gt; button.&lt;/p&gt;\n&lt;p&gt;The genus &lt;i&gt;Homo sapiens&lt;/i&gt;.&lt;/p&gt;" },
  { q:"What are meta tags and why are they important?", d:"Medium",
    a:"Meta tags sit inside &lt;head&gt; and provide metadata about the page — invisible to users but critical for browsers, search engines, and social platforms. The <strong>viewport</strong> meta is essential for mobile responsiveness. <strong>og:*</strong> tags control how the page looks when shared on social media.",
    code:"&lt;head&gt;\n  &lt;meta charset=\"UTF-8\" /&gt;\n  &lt;meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" /&gt;\n  &lt;meta name=\"description\" content=\"Page description for SEO (150-160 chars)\" /&gt;\n  &lt;meta property=\"og:title\" content=\"Page Title\" /&gt;\n  &lt;meta property=\"og:image\" content=\"/preview.png\" /&gt;\n  &lt;title&gt;Page Title&lt;/title&gt;\n&lt;/head&gt;" },
  { q:"What is the purpose of the alt attribute on images?", d:"Easy",
    a:"Alt provides a <strong>text alternative</strong> when images fail to load, and is read aloud by screen readers. Empty alt (alt=\"\") tells screen readers the image is purely decorative. A missing alt attribute is an accessibility violation. Descriptive alt text also contributes to image SEO.",
    code:"&lt;!-- Informative image -- describe it --&gt;\n&lt;img src=\"chart.png\" alt=\"Bar chart showing 40% growth in Q4 2024\" /&gt;\n\n&lt;!-- Decorative image -- empty alt --&gt;\n&lt;img src=\"divider.png\" alt=\"\" /&gt;\n\n&lt;!-- Missing alt -- accessibility violation --&gt;\n&lt;img src=\"photo.jpg\" /&gt; ❌" },
  { q:"What is the difference between &lt;link&gt; and @import for stylesheets?", d:"Medium",
    a:"<strong>&lt;link&gt;</strong> is an HTML tag that loads CSS in parallel with page parsing — always preferred. <strong>@import</strong> is a CSS rule that loads stylesheets sequentially and blocks rendering until each imported sheet is downloaded. Link is always faster and should be used for all external stylesheets.",
    code:"&lt;!-- Preferred: parallel, non-blocking --&gt;\n&lt;link rel=\"stylesheet\" href=\"style.css\" /&gt;\n\n&lt;!-- Avoid: sequential, blocks render --&gt;\n&lt;style&gt;\n  @import url('style.css'); /* slower */\n&lt;/style&gt;" },
  { q:"What is the difference between block, inline, and inline-block?", d:"Easy",
    a:"<strong>Block</strong> elements (&lt;div&gt;, &lt;p&gt;, &lt;h1&gt;) start on a new line and stretch full width. <strong>Inline</strong> elements (&lt;span&gt;, &lt;a&gt;) flow within text and only take their content's width. <strong>Inline-block</strong> flows inline but accepts width, height, and vertical padding/margin like a block.",
    code:"/* Block: full width, new line */\ndiv { display: block; }\n\n/* Inline: content width, no height/top-bottom margin */\nspan { display: inline; }\n\n/* Inline-block: inline flow + block sizing */\n.badge { display: inline-block; width: 24px; height: 24px; }" },
  { q:"What is the difference between &lt;section&gt; and &lt;article&gt;?", d:"Easy",
    a:"<strong>&lt;article&gt;</strong> is a self-contained piece of content that makes sense on its own — a blog post, news article, forum post. <strong>&lt;section&gt;</strong> groups related content that's part of a larger whole. An article can contain sections; sections typically belong to a larger page context.",
    code:"&lt;article&gt;\n  &lt;h2&gt;How to Use CSS Grid&lt;/h2&gt;\n  &lt;section&gt;\n    &lt;h3&gt;Basic Syntax&lt;/h3&gt;\n    &lt;p&gt;...&lt;/p&gt;\n  &lt;/section&gt;\n  &lt;section&gt;\n    &lt;h3&gt;Advanced Layouts&lt;/h3&gt;\n    &lt;p&gt;...&lt;/p&gt;\n  &lt;/section&gt;\n&lt;/article&gt;" },
  { q:"What is ARIA and when should you use it?", d:"Medium",
    a:"ARIA (Accessible Rich Internet Applications) adds semantic meaning to HTML for screen readers via roles, states, and properties. Use it only when native HTML semantics are insufficient — prefer native elements first. Key attributes: <strong>role</strong>, <strong>aria-label</strong>, <strong>aria-hidden</strong>, <strong>aria-expanded</strong>, <strong>aria-live</strong>.",
    code:"&lt;!-- Native button has built-in semantics -- prefer this --&gt;\n&lt;button type=\"button\"&gt;Close&lt;/button&gt;\n\n&lt;!-- When you must use a div for interaction --&gt;\n&lt;div role=\"button\" tabindex=\"0\"\n     aria-label=\"Close modal\"\n     onkeydown=\"handleKey(event)\"&gt;\n  &times;\n&lt;/div&gt;\n\n&lt;!-- Live region for dynamic updates --&gt;\n&lt;div aria-live=\"polite\" aria-atomic=\"true\"&gt;\n  &lt;span id=\"status\"&gt;&lt;/span&gt;\n&lt;/div&gt;" },
  { q:"What is the difference between &lt;input type='submit'&gt; and &lt;button&gt;?", d:"Easy",
    a:"<strong>&lt;input type='submit'&gt;</strong> is a void element — it can't contain HTML. <strong>&lt;button&gt;</strong> can contain HTML (icons, spans). &lt;button&gt; without a type attribute inside a form defaults to type='submit'. Always set the type explicitly to avoid accidental form submissions.",
    code:"&lt;!-- Limited -- text only --&gt;\n&lt;input type=\"submit\" value=\"Submit\" /&gt;\n\n&lt;!-- Flexible -- can contain HTML --&gt;\n&lt;button type=\"submit\"&gt;\n  &lt;svg&gt;...&lt;/svg&gt; Submit\n&lt;/button&gt;\n\n&lt;!-- Explicit type prevents accidental form submit --&gt;\n&lt;button type=\"button\" onclick=\"openModal()\"&gt;\n  Open\n&lt;/button&gt;" },
  { q:"What is lazy loading and how do you implement it?", d:"Medium",
    a:"Lazy loading defers loading of non-critical resources (images, iframes) until they're needed — typically when entering the viewport. The native <strong>loading=\"lazy\"</strong> attribute on &lt;img&gt; and &lt;iframe&gt; is supported by all modern browsers. Use the Intersection Observer API for custom lazy-loading behavior.",
    code:"&lt;!-- Native lazy loading --&gt;\n&lt;img\n  src=\"photo.jpg\"\n  loading=\"lazy\"\n  alt=\"Description\"\n  width=\"800\" height=\"600\"\n/&gt;\n\n&lt;!-- Always include width/height to prevent layout shift --&gt;\n&lt;iframe\n  src=\"https://example.com\"\n  loading=\"lazy\"\n  width=\"600\" height=\"400\"\n&gt;&lt;/iframe&gt;" },
]
  { q:"What is the clamp() function?", d:"Medium",
    a:"<strong>clamp(min, preferred, max)</strong> returns the preferred value clamped between min and max. Perfect for fluid typography and spacing that scales with the viewport without media queries.",
    code:"/* Fluid font: scales between 16px and 32px */\nh1 { font-size: clamp(1rem, 2.5vw + 1rem, 2rem); }\n\n/* Fluid spacing */\n.section { padding: clamp(24px, 5vw, 80px); }\n\n/* Fluid container */\n.wrap { width: clamp(320px, 90%, 1200px); margin: 0 auto; }" },
  { q:"What are CSS logical properties?", d:"Medium",
    a:"Logical properties use <strong>block/inline directions</strong> instead of physical directions (top/right/bottom/left) — making layouts work correctly for both LTR and RTL writing modes automatically.",
    code:"/* Physical (breaks RTL) */\n.card { margin-left: 16px; padding-top: 24px; }\n\n/* Logical (works in any writing mode) */\n.card {\n  margin-inline-start: 16px; /* left in LTR, right in RTL */\n  padding-block-start: 24px;\n  margin-block: 16px;   /* top + bottom */\n  margin-inline: 24px;  /* left + right */\n}" },
  { q:"What is :is() and :where()?", d:"Medium",
    a:"<strong>:is()</strong> matches any element in its selector list, adopting the <strong>highest specificity</strong> of its arguments. <strong>:where()</strong> is identical but has <strong>zero specificity</strong> — great for base styles that should be easily overridden.",
    code:"/* Without :is() -- repetitive */\nh1 a, h2 a, h3 a { color: inherit; }\n\n/* :is() -- concise, specificity = highest arg */\n:is(h1, h2, h3) a { color: inherit; }\n\n/* :where() -- zero specificity, easily overridden */\n:where(h1, h2, h3) { margin-bottom: 0.5em; }\n.intro h2 { margin-bottom: 1.5em; } /* overrides easily */" },
  { q:"What is the aspect-ratio property?", d:"Easy",
    a:"<strong>aspect-ratio</strong> maintains a width-to-height ratio as an element resizes. Replaces the old 'padding-top hack' for responsive iframes and videos. Combine with object-fit for responsive media.",
    code:"/* Responsive 16:9 video */\n.video { aspect-ratio: 16 / 9; width: 100%; }\n\n/* Square avatar */\n.avatar { aspect-ratio: 1; width: 64px; border-radius: 50%; }\n\n/* Image fills box */\n.thumbnail {\n  aspect-ratio: 4 / 3;\n  object-fit: cover;\n  width: 100%;\n}" },
  { q:"What are CSS container queries?", d:"Hard",
    a:"Container queries apply styles based on a <strong>parent container's size</strong> — not the viewport. This enables truly component-based responsive design. Declare containment with container-type, then query with @container.",
    code:".card-wrapper {\n  container-type: inline-size;\n  container-name: card;\n}\n\n@container card (min-width: 400px) {\n  .card { display: flex; gap: 16px; }\n  .card__image { width: 160px; flex-shrink: 0; }\n}\n/* Same component adapts to sidebar vs main content */" },
  { q:"What is CSS scroll-snap?", d:"Medium",
    a:"<strong>scroll-snap</strong> creates controlled snapping behavior during scroll — for carousels, full-page sections, and image galleries without JavaScript. Set scroll-snap-type on the container and scroll-snap-align on children.",
    code:".carousel {\n  display: flex;\n  overflow-x: auto;\n  scroll-snap-type: x mandatory;\n  scroll-behavior: smooth;\n}\n.slide {\n  flex-shrink: 0;\n  width: 100%;\n  scroll-snap-align: start;\n}\n\n/* Full-page sections */\n.page { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; }\n.section { height: 100vh; scroll-snap-align: start; }" },
,
CSS: [
  { q:"What is the CSS Box Model?", d:"Easy",
    a:"Every element is a rectangular box with four layers: <strong>content</strong>, <strong>padding</strong> (inner space), <strong>border</strong>, and <strong>margin</strong> (outer space). By default (content-box), width/height applies to content only. Use <strong>box-sizing: border-box</strong> globally to include padding and border in the declared size — this is always recommended.",
    code:"/* Always add this global reset */\n*, *::before, *::after {\n  box-sizing: border-box;\n}\n\n.box {\n  width: 200px;    /* includes padding + border */\n  padding: 20px;\n  border: 2px solid #ccc;\n  margin: 16px;    /* outside, not included in width */\n}" },
  { q:"What is CSS specificity and how are conflicts resolved?", d:"Medium",
    a:"Specificity is calculated as <strong>(inline, id, class/attr, element)</strong> — each column wins over lower columns regardless of count. Inline styles (style=\"\") always win. !important overrides everything (use sparingly). When specificity ties, the <strong>last rule in source order</strong> wins.",
    code:"/* (0,0,1,0) — class */\n.button { color: blue; }\n\n/* (0,1,0,0) — id — wins over class */\n#submit { color: red; }\n\n/* (0,0,2,1) — two classes + element */\ndiv.card.featured { color: green; }\n\n/* Overrides everything — avoid */\n.btn { color: orange !important; }" },
  { q:"What is Flexbox and when do you use it?", d:"Medium",
    a:"Flexbox is a <strong>one-dimensional</strong> layout system — it distributes space along a single row or column. Perfect for: navigation bars, centering elements vertically, equal-height cards, distributing space between items. Set display: flex on the parent; all direct children become flex items.",
    code:".nav {\n  display: flex;\n  align-items: center;           /* cross-axis: vertical */\n  justify-content: space-between; /* main-axis: horizontal */\n  gap: 16px;\n}\n\n/* Center anything perfectly */\n.center {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}" },
  { q:"What is CSS Grid and how does it differ from Flexbox?", d:"Medium",
    a:"Grid is <strong>two-dimensional</strong> — it controls rows AND columns simultaneously. Flexbox is one-dimensional. Use Grid for page-level layouts and complex 2D arrangements. Use Flexbox for component alignment and single-axis distribution. They complement each other — use both.",
    code:".layout {\n  display: grid;\n  grid-template-columns: 240px 1fr;     /* sidebar + main */\n  grid-template-rows: 64px 1fr 48px;   /* header, content, footer */\n  gap: 16px;\n  min-height: 100vh;\n}\n\n/* Responsive columns */\n.cards {\n  display: grid;\n  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));\n  gap: 16px;\n}" },
  { q:"What is the difference between CSS position values?", d:"Medium",
    a:"<strong>static</strong>: default, normal flow. <strong>relative</strong>: offset from normal position, still occupies space, creates positioning context. <strong>absolute</strong>: removed from flow, positioned relative to nearest positioned ancestor. <strong>fixed</strong>: relative to viewport, stays on scroll. <strong>sticky</strong>: relative until threshold, then fixed.",
    code:".sticky-header {\n  position: sticky;\n  top: 0;         /* sticks at 0px from top */\n  z-index: 100;\n}\n\n.tooltip {\n  position: absolute; /* relative to nearest positioned parent */\n  top: calc(100% + 8px);\n  left: 50%;\n  transform: translateX(-50%);\n}" },
  { q:"What is the difference between em, rem, px, vh, and vw?", d:"Easy",
    a:"<strong>px</strong>: absolute, fixed size. <strong>em</strong>: relative to parent's font-size — compounds in nested elements. <strong>rem</strong>: relative to root &lt;html&gt; font-size — predictable, doesn't compound. <strong>vh/vw</strong>: percentage of viewport height/width. Best practice: rem for fonts, px for borders/shadows, % or fr for layouts.",
    code:":root { font-size: 16px; }\n\n.text {\n  font-size: 1rem;    /* 16px — predictable */\n  padding: 0.75em;    /* relative to THIS element's font-size */\n  border: 1px solid;  /* px for fine details */\n}\n\n.hero {\n  height: 100vh;      /* full viewport height */\n  width: min(90vw, 1200px);\n}" },
  { q:"What are CSS custom properties (variables)?", d:"Easy",
    a:"CSS variables are declared with <strong>--</strong> prefix and accessed via <strong>var()</strong>. Unlike preprocessor variables (Sass/Less), they: cascade and inherit like any CSS property, can be updated at runtime with JavaScript, can be scoped to any element, and respond to media queries.",
    code:":root {\n  --color-primary: #6c63ff;\n  --spacing-md: 1rem;\n  --radius: 8px;\n}\n\n/* Scoped override */\n[data-theme='dark'] {\n  --color-primary: #a89cff;\n}\n\n.button {\n  background: var(--color-primary);\n  padding: var(--spacing-md);\n  border-radius: var(--radius);\n}\n\n/* Update via JS */\ndocument.documentElement.style\n  .setProperty('--color-primary', '#ff6b35');" },
  { q:"What is z-index and what creates a stacking context?", d:"Hard",
    a:"z-index controls layer order — higher values render in front. It only works on <strong>positioned</strong> elements (not static). A new stacking context is created by: position + z-index != auto, opacity < 1, transform, filter, will-change, isolation: isolate. Elements inside a context are sorted only within it — a z-index:9999 child can't escape a z-index:1 parent.",
    code:"/* Creates a stacking context */\n.modal-container {\n  position: fixed;\n  z-index: 1000;\n  /* All children z-index relative to this */\n}\n\n/* Explicit stacking context */\n.component {\n  isolation: isolate; /* clean stacking context */\n}" },
  { q:"What is the difference between display:none and visibility:hidden?", d:"Easy",
    a:"<strong>display: none</strong> removes the element from document flow — takes up zero space, inaccessible to screen readers. <strong>visibility: hidden</strong> hides the element but it still occupies its layout space. <strong>opacity: 0</strong> is invisible but still interactive and occupies space. Use opacity for animations.",
    code:"/* Completely removed from layout */\n.hidden { display: none; }\n\n/* Invisible but occupies space */\n.ghost { visibility: hidden; }\n\n/* Invisible, interactive, animatable */\n.fade { opacity: 0; transition: opacity 0.3s; }\n.fade:hover { opacity: 1; }" },
  { q:"What is a pseudo-class vs a pseudo-element?", d:"Medium",
    a:"<strong>Pseudo-classes</strong> (:hover, :focus, :nth-child, :checked) target elements in a specific state. <strong>Pseudo-elements</strong> (::before, ::after, ::first-line) style a specific part of an element's content. The double-colon (::) for pseudo-elements is the modern convention but single-colon still works for legacy support.",
    code:"/* Pseudo-class — element in a state */\n.btn:hover { background: #5a52e0; }\n.input:focus { outline: 2px solid blue; }\nli:nth-child(odd) { background: #f9f9f9; }\n\n/* Pseudo-element — virtual sub-element */\n.card::before {\n  content: '';\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n}\n\np::first-line { font-weight: 500; }" },
  { q:"What are CSS transitions vs CSS animations?", d:"Medium",
    a:"<strong>Transitions</strong> animate between two states triggered by a state change (hover, focus, class toggle) — defined by property, duration, timing. <strong>Animations</strong> use @keyframes and run independently, can loop, alternate, and have multiple steps. Transitions are simpler; animations offer full control.",
    code:"/* Transition: triggered by state change */\n.btn {\n  background: #2563eb;\n  transition: background 0.2s ease, transform 0.15s;\n}\n.btn:hover {\n  background: #1d4ed8;\n  transform: translateY(-2px);\n}\n\n/* Animation: runs independently */\n@keyframes spin {\n  from { transform: rotate(0deg); }\n  to   { transform: rotate(360deg); }\n}\n.loader {\n  animation: spin 1s linear infinite;\n}" },
  { q:"How does CSS @media query work?", d:"Easy",
    a:"Media queries apply CSS rules conditionally based on viewport size, device type, or user preferences. The <strong>mobile-first</strong> approach uses min-width breakpoints — base styles target mobile, larger screens progressively add complexity. <strong>prefers-color-scheme</strong> and <strong>prefers-reduced-motion</strong> target user system settings.",
    code:"/* Mobile first */\n.grid {\n  display: block;        /* mobile: stacked */\n}\n@media (min-width: 640px) {\n  .grid { display: grid; grid-template-columns: 1fr 1fr; }\n}\n@media (min-width: 1024px) {\n  .grid { grid-template-columns: repeat(3, 1fr); }\n}\n\n/* System preference */\n@media (prefers-color-scheme: dark) {\n  :root { --bg: #0c0e13; }\n}\n@media (prefers-reduced-motion: reduce) {\n  * { animation-duration: 0.01ms !important; }\n}" },
  { q:"What is the CSS cascade and how does it work?", d:"Medium",

    code:"const handler = {\n  get(target, key) {\n    console.log(`Getting: ${String(key)}`);\n    return Reflect.get(target, key);\n  },\n  set(target, key, value) {\n    if (typeof value !== 'number') throw new TypeError('Numbers only!');\n    return Reflect.set(target, key, value);\n  }\n};\n\nconst nums = new Proxy({}, handler);\nnums.a = 42;    // ✅\nnums.b = 'hi';  // ❌ TypeError" },

  { q:"How does the JavaScript event loop work?", d:"Hard",
    a:"JS is single-threaded. The event loop works in order: 1) run all synchronous code (call stack). 2) drain all <strong>microtasks</strong> (Promise callbacks, queueMicrotask). 3) run one <strong>macrotask</strong> (setTimeout, setInterval, I/O). 4) repeat. This is why Promise callbacks always run before setTimeout, even with 0ms delay.",
    code:"console.log('1 — sync');\n\nsetTimeout(() => console.log('4 — macrotask'), 0);\n\nPromise.resolve()\n  .then(() => console.log('2 — microtask'))\n  .then(() => console.log('3 — microtask'));\n\nconsole.log('still sync');\n// Output: 1, still sync, 2, 3, 4" },
  { q:"What is hoisting in JavaScript?", d:"Medium",
    a:"Hoisting moves <strong>declarations</strong> (not initializations) to the top of their scope during compilation. var is hoisted and initialized as undefined. Function declarations are fully hoisted — callable before definition. let/const are hoisted but not initialized — accessing before declaration throws a <strong>ReferenceError</strong> (Temporal Dead Zone).",
    code:"console.log(a); // undefined (var hoisted)\nvar a = 5;\n\nconsole.log(b); // ReferenceError: TDZ\nlet b = 5;\n\nfoo();          // ✅ works — fully hoisted\nfunction foo() { return 'hello'; }\n\nbar();          // ❌ TypeError — not yet assigned\nconst bar = () => 'arrow';" },
  { q:"How do Promises and async/await work?", d:"Medium",
    a:"A Promise represents a value that may be available now, later, or never — it's <strong>pending</strong>, <strong>fulfilled</strong>, or <strong>rejected</strong>. async/await is syntactic sugar over Promises: async functions always return a Promise, await pauses function execution until the Promise settles. Use try/catch for error handling.",
    code:"// Promise chain\nfetch('/api/user')\n  .then(res => res.json())\n  .then(user => console.log(user))\n  .catch(err => console.error(err));\n\n// async/await — same thing, more readable\nasync function getUser() {\n  try {\n    const res  = await fetch('/api/user');\n    const user = await res.json();\n    return user;\n  } catch (err) {\n    console.error('Failed:', err);\n  }\n}\n\n// Run multiple in parallel\nconst [user, posts] = await Promise.all([\n  getUser(), getPosts()\n]);" },
  { q:"What is 'this' in JavaScript?", d:"Hard",
    a:"<strong>this</strong> is determined by <em>how</em> a function is called, not where it's defined. In a method: this = the object. Standalone call: undefined (strict) or globalThis. Arrow functions don't have own this — they inherit from lexical scope. call/apply/bind explicitly set this.",
    code:"const person = {\n  name: 'Alice',\n  greet() { return `Hi, ${this.name}`; },\n  arrowGreet: () => `Hi, ${this.name}`, // undefined!\n};\n\nperson.greet();      // 'Hi, Alice'\nperson.arrowGreet(); // 'Hi, undefined'\n\nconst fn = person.greet;\nfn();                // 'Hi, undefined' (lost context)\nfn.call(person);     // 'Hi, Alice'\n\nconst bound = person.greet.bind(person);\nbound();             // 'Hi, Alice' (permanently bound)" },
  { q:"What is event delegation?", d:"Medium",

    code:"// ❌ Inefficient -- listener on each item\ndocument.querySelectorAll('li').forEach(li =>\n  li.addEventListener('click', handler)\n);\n\n// ✅ Event delegation -- one listener\ndocument.querySelector('#list')\n  .addEventListener('click', (e) => {\n    const item = e.target.closest('li');\n    if (!item) return;\n    console.log('clicked:', item.dataset.id);\n  });" },
  { q:"What is the difference between call, apply, and bind?", d:"Medium",
    a:"All three explicitly set <strong>this</strong>. <strong>call</strong>: invokes immediately, args listed separately. <strong>apply</strong>: invokes immediately, args as array. <strong>bind</strong>: returns a new function with this permanently bound — doesn't invoke immediately. Bind is used for callbacks, partial application, and React event handlers.",
    code:"function greet(greeting, punct) {\n  return `${greeting}, ${this.name}${punct}`;\n}\nconst user = { name: 'Alice' };\n\ngreet.call(user, 'Hello', '!');   // 'Hello, Alice!'\ngreet.apply(user, ['Hi', '?']);   // 'Hi, Alice?'\n\nconst sayHi = greet.bind(user, 'Hey');\nsayHi('.');                       // 'Hey, Alice.'" },
  { q:"What is debouncing vs throttling?", d:"Medium",
    a:"<strong>Debouncing</strong> delays execution until after a pause — the timer resets on every call. Use for: search input, window resize, save-as-you-type. <strong>Throttling</strong> limits execution to at most once per interval. Use for: scroll events, mouse moves, API rate limiting.",
    code:"// Debounce -- waits 300ms after LAST call\nconst debounce = (fn, ms) => {\n  let timer;\n  return (...args) => {\n    clearTimeout(timer);\n    timer = setTimeout(() => fn(...args), ms);\n  };\n};\n\n// Throttle -- runs at most once per 300ms\nconst throttle = (fn, ms) => {\n  let last = 0;\n  return (...args) => {\n    if (Date.now() - last >= ms) {\n      last = Date.now();\n      fn(...args);\n    }\n  };\n};\n\nwindow.addEventListener('resize', debounce(onResize, 300));\nwindow.addEventListener('scroll', throttle(onScroll, 100));" },
  { q:"What is prototypal inheritance?", d:"Hard",
    a:"Every JS object has an internal <strong>[[Prototype]]</strong> link to another object. Property lookups walk up the chain until found or null is reached. The class syntax is <strong>syntactic sugar</strong> over prototypal inheritance — no class-based OOP under the hood.",
    code:"// Prototypal\nconst animal = {\n  speak() { return `${this.name} makes a sound`; }\n};\nconst dog = Object.create(animal);\ndog.name = 'Rex';\ndog.bark = () => 'woof!';\n\ndog.speak(); // 'Rex makes a sound' (from prototype)\ndog.bark();  // 'woof!' (own property)\n\n// Class syntax (same thing underneath)\nclass Dog extends Animal {\n  bark() { return 'woof!'; }\n}" },
  { q:"What are generators and iterators?", d:"Hard",
    a:"An <strong>iterator</strong> is an object with a next() method that returns { value, done }. A <strong>generator</strong> is a function using function* that pauses with yield, resuming on next(). Generators enable lazy sequences, infinite streams, custom iteration, and are the foundation of async generators.",
    code:"function* range(start, end, step = 1) {\n  for (let i = start; i < end; i += step) {\n    yield i;\n  }\n}\n\nfor (const n of range(0, 10, 2)) {\n  console.log(n); // 0, 2, 4, 6, 8\n}\n\n// Infinite sequence\nfunction* fibonacci() {\n  let [a, b] = [0, 1];\n  while (true) {\n    yield a;\n    [a, b] = [b, a + b];\n  }\n}\n\nconst fib = fibonacci();\nfib.next().value; // 0\nfib.next().value; // 1\nfib.next().value; // 1" },
  { q:"What is destructuring in JavaScript?", d:"Easy",

    code:"// Object destructuring\nconst { name, age, role = 'user' } = user;\nconst { address: { city } } = user; // nested\nconst { id: userId } = user;         // rename\n\n// Array destructuring\nconst [first, second, ...rest] = [1, 2, 3, 4];\nconst [,, third] = arr; // skip elements\n\n// Function parameters\nfunction greet({ name, greeting = 'Hello' }) {\n  return `${greeting}, ${name}!`;\n}\n\n// Swap variables\n[a, b] = [b, a];" },

    code:"// Loose equality surprises\n0 == false      // true (coercion)\n'' == false     // true\nnull == undefined // true\n'1' == 1        // true\n\n// Strict equality\n0 === false     // false\n'' === false    // false\nnull === undefined // false\n\n// The one valid use of ==\nif (value == null) {\n  // catches both null and undefined\n}" },

  { q:"What is useLayoutEffect vs useEffect?", d:"Hard",

    code:"// React 17: two renders inside setTimeout\nsetTimeout(() => {\n  setCount(c => c + 1); // render\n  setFlag(f => !f);     // render\n}, 1000);\n\n// React 18: one render (automatic batching)\nsetTimeout(() => {\n  setCount(c => c + 1);\n  setFlag(f => !f);  // batched!\n}, 1000);\n\n// Opt out when needed\nimport { flushSync } from 'react-dom';\nflushSync(() => setCount(c => c + 1)); // immediate render" },
  { q:"What are React Server Components?", d:"Hard",
    a:"<strong>React Server Components</strong> render on the server only — their code never ships to the browser. They enable: direct DB/file access, zero-bundle third-party imports, improved initial load. Client Components use 'use client'. Server Components can't use state, effects, or browser APIs.",
    code:"// ServerComponent.tsx (server by default in Next.js)\nexport default async function UserList() {\n  const users = await db.query('SELECT * FROM users');\n  return &lt;ul&gt;{users.map(u => &lt;li key={u.id}&gt;{u.name}&lt;/li&gt;)}&lt;/ul&gt;;\n  // Code never ships to browser!\n}\n\n// ClientComponent.tsx\n'use client';\nexport default function Counter() {\n  const [count, setCount] = useState(0);\n  return &lt;button onClick={() => setCount(c => c+1)}&gt;{count}&lt;/button&gt;;\n}" },

    code:"const [query, setQuery]     = useState('');\nconst [results, setResults] = useState([]);\nconst [isPending, startTransition] = useTransition();\n\nfunction handleSearch(e) {\n  setQuery(e.target.value);           // urgent: immediate\n  startTransition(() => {             // non-urgent: interruptible\n    setResults(filterBigList(e.target.value));\n  });\n}\n\nreturn (\n  &lt;&gt;\n    &lt;input value={query} onChange={handleSearch} /&gt;\n    {isPending ? &lt;Spinner /&gt; : &lt;List data={results} /&gt;}\n  &lt;/&gt;\n);" },

  { q:"What is the Virtual DOM and how does React use it?", d:"Medium",
    a:"The Virtual DOM is an in-memory JavaScript representation of the real DOM tree. When state changes, React creates a <strong>new virtual tree</strong>, diffs it against the previous one (reconciliation), and applies only the minimal real DOM changes needed. This batching and diffing avoids expensive full DOM re-renders.",

  { q:"What is the difference between useState and useReducer?", d:"Medium",
    a:"<strong>useState</strong> is ideal for simple, independent state values. <strong>useReducer</strong> is better when: next state depends on previous, multiple values change together, update logic is complex, or you need to test the logic in isolation (pure reducer functions).",
    code:"// useState -- simple\nconst [count, setCount] = useState(0);\n\n// useReducer -- complex state\nconst [state, dispatch] = useReducer((state, action) => {\n  switch (action.type) {\n    case 'INCREMENT': return { ...state, count: state.count + 1 };\n    case 'RESET':     return { count: 0, error: null };\n    case 'ERROR':     return { ...state, error: action.payload };\n    default: throw new Error('Unknown action');\n  }\n}, { count: 0, error: null });\n\ndispatch({ type: 'INCREMENT' });" },
  { q:"How does the useEffect dependency array work?", d:"Medium",
    a:"useEffect's dependency array controls <strong>when</strong> the effect re-runs. <strong>[]</strong>: run once on mount. <strong>[a, b]</strong>: re-run when a or b changes (shallow comparison). <strong>omitted</strong>: run after every render. Always return a cleanup function to cancel timers, subscriptions, or in-flight requests.",
    code:"// Once on mount, cleanup on unmount\nuseEffect(() => {\n  const sub = websocket.subscribe(onMessage);\n  return () => sub.unsubscribe();\n}, []);\n\n// Re-run when userId changes\nuseEffect(() => {\n  const controller = new AbortController();\n  fetch(`/api/user/${userId}`, { signal: controller.signal })\n    .then(r => r.json())\n    .then(setUser);\n  return () => controller.abort(); // cancel on cleanup\n}, [userId]);" },
  { q:"What is the difference between useMemo and useCallback?", d:"Hard",
    a:"<strong>useMemo</strong> memoizes the <em>result</em> of a computation — returns cached value until deps change. <strong>useCallback</strong> memoizes a <em>function reference</em> — prevents creating a new function on every render. Both exist to preserve referential equality so child components wrapped in React.memo don't re-render unnecessarily.",
    code:"// useMemo -- expensive calculation\nconst sortedList = useMemo(\n  () => [...items].sort((a, b) => a.score - b.score),\n  [items]  // only recalculates when items changes\n);\n\n// useCallback -- stable function reference\nconst handleDelete = useCallback(\n  (id) => dispatch({ type: 'DELETE', id }),\n  [dispatch]  // same fn reference unless dispatch changes\n);\n\n// Pair with React.memo on child\nconst Row = React.memo(({ onDelete }) => {\n  /* only re-renders if onDelete reference changes */\n});" },
  { q:"What is prop drilling and how do you solve it?", d:"Medium",
    a:"Prop drilling is threading props through multiple layers of components just to reach a distant child. Solutions: <strong>Context API</strong> for global data (theme, auth, locale), <strong>Zustand/Redux</strong> for complex app state, <strong>Component composition</strong> (passing children/JSX as props to skip intermediate layers).",
    code:"// Context API solution\nconst AuthCtx = createContext(null);\n\nfunction App() {\n  const auth = useAuth();\n  return (\n    &lt;AuthCtx.Provider value={auth}&gt;\n      &lt;Router /&gt;\n    &lt;/AuthCtx.Provider&gt;\n  );\n}\n\n// Any descendant can access it\nfunction UserMenu() {\n  const { user, logout } = useContext(AuthCtx);\n  return &lt;button onClick={logout}&gt;{user.name}&lt;/button&gt;;\n}" },
  { q:"What is the key prop and why is it critical?", d:"Medium",
    a:"Keys help React identify which items in a list were added, removed, or reordered during reconciliation. Without stable keys, React reuses DOM nodes incorrectly — causing <strong>state bugs</strong> (inputs keeping wrong values, animations glitching). Never use array index as key when lists can be sorted or filtered.",
    code:"// ❌ Index as key -- causes bugs on reorder/delete\n{items.map((item, i) => &lt;Row key={i} {...item} /&gt;)}\n\n// ✅ Stable unique ID from data\n{items.map(item => &lt;Row key={item.id} {...item} /&gt;)}\n\n// ✅ Also good: stable string key\n{tabs.map(tab => &lt;Tab key={tab.slug} {...tab} /&gt;)}" },
  { q:"What is React.memo and when should you use it?", d:"Hard",
    a:"React.memo is a HOC that wraps a component and <strong>skips re-rendering</strong> if props haven't changed (shallow equality check). Use it for pure components that receive the same props often but render expensively. Don't overuse — the comparison itself has cost, and most components are fast enough without it.",
    code:"// Basic usage\nconst Avatar = React.memo(function Avatar({ src, name }) {\n  return &lt;img src={src} alt={name} /&gt;;\n});\n\n// Custom comparison (return true to SKIP re-render)\nconst Row = React.memo(\n  function Row({ user }) { return &lt;tr&gt;{user.name}&lt;/tr&gt;; },\n  (prev, next) => prev.user.id === next.user.id\n);" },
  { q:"What are controlled vs uncontrolled form components?", d:"Medium",
    a:"<strong>Controlled</strong>: React state is the single source of truth — input value is bound to state, onChange updates state. Enables real-time validation and conditional logic. <strong>Uncontrolled</strong>: DOM manages state, accessed via ref. Simpler for basic forms. File inputs must be uncontrolled.",
    code:"// Controlled -- React owns the state\nconst [email, setEmail] = useState('');\n&lt;input\n  value={email}\n  onChange={e => setEmail(e.target.value)}\n/&gt;\n\n// Uncontrolled -- DOM owns the state\nconst inputRef = useRef(null);\nconst handleSubmit = () => {\n  console.log(inputRef.current.value);\n};\n&lt;input ref={inputRef} defaultValue=\"initial\" /&gt;" },
  { q:"What is code splitting and React.lazy?", d:"Medium",
    a:"Code splitting breaks the JS bundle into smaller chunks loaded on demand — reducing initial bundle size and improving load time. <strong>React.lazy</strong> wraps a dynamic import and makes it work with <strong>Suspense</strong>. The component's code only downloads when first rendered.",
    code:"import { lazy, Suspense } from 'react';\n\n// Only downloaded when rendered\nconst Dashboard = lazy(() => import('./Dashboard'));\nconst Settings  = lazy(() => import('./Settings'));\n\nfunction App() {\n  return (\n    &lt;Suspense fallback={&lt;PageSpinner /&gt;}&gt;\n      {page === 'dashboard' && &lt;Dashboard /&gt;}\n      {page === 'settings'  && &lt;Settings  /&gt;}\n    &lt;/Suspense&gt;\n  );\n}" },
  { q:"What is the React reconciliation algorithm?", d:"Hard",
    a:"React's diffing algorithm computes minimal DOM updates in <strong>O(n)</strong> time (vs naive O(n³)). Rules: elements of different types produce entirely new trees. Same-type elements update only changed attributes. Lists use <strong>keys</strong> to match old/new items and avoid unnecessary unmounts/remounts.",
    code:"// React reconciles these efficiently:\n// Before:\n&lt;ul&gt;\n  &lt;li key=\"a\"&gt;A&lt;/li&gt;\n  &lt;li key=\"b\"&gt;B&lt;/li&gt;\n&lt;/ul&gt;\n\n// After (item added at top):\n&lt;ul&gt;\n  &lt;li key=\"c\"&gt;C&lt;/li&gt;  {/* new -- mounted */}\n  &lt;li key=\"a\"&gt;A&lt;/li&gt;  {/* moved -- not remounted */}\n  &lt;li key=\"b\"&gt;B&lt;/li&gt;  {/* moved -- not remounted */}\n&lt;/ul&gt;" },
  { q:"What are React Portals?", d:"Hard",
    a:"Portals render a component's output into a <strong>different DOM node</strong> than its parent — while keeping it in the React component tree (events still bubble through React tree). Essential for modals, tooltips, and dropdowns that need to escape overflow:hidden or z-index constraints.",
    code:"import { createPortal } from 'react-dom';\n\nfunction Modal({ isOpen, children }) {\n  if (!isOpen) return null;\n  return createPortal(\n    &lt;div className=\"modal-overlay\"&gt;\n      &lt;div className=\"modal-box\"&gt;\n        {children}\n      &lt;/div&gt;\n    &lt;/div&gt;,\n    document.getElementById('modal-root')\n  );\n}\n// Events bubble to App in React tree\n// even though DOM renders in #modal-root" },
  { q:"What is useRef and when would you use it?", d:"Medium",
    a:"<strong>useRef</strong> returns a mutable object with a .current property that persists across renders without triggering re-renders. Two main use cases: <strong>DOM references</strong> (focus, scroll, measurements) and <strong>mutable values</strong> that shouldn't trigger renders (previous value, timer IDs, abort controllers).",
    code:"function Form() {\n  const inputRef = useRef(null);\n\n  // DOM access\n  const focusInput = () => inputRef.current.focus();\n\n  return &lt;input ref={inputRef} /&gt;;\n}\n\n// Storing mutable value without re-render\nfunction Timer() {\n  const timerRef = useRef(null);\n\n  const start = () => {\n    timerRef.current = setInterval(tick, 1000);\n  };\n  const stop = () => {\n    clearInterval(timerRef.current);\n  };\n}" },
  { q:"What is context and what are its performance implications?", d:"Hard",
    a:"Context provides a way to share values across the component tree without explicit prop passing. <strong>Performance trap</strong>: every consumer re-renders when context value changes — even if only a portion of the context changed. Mitigate by: splitting contexts, memoizing values, using state management libraries for frequent updates.",
    code:"// Split contexts to prevent unnecessary re-renders\nconst ThemeCtx  = createContext(null); // rarely changes\nconst UserCtx   = createContext(null); // rarely changes\nconst CartCtx   = createContext(null); // changes often\n\n// Memoize context value\nfunction CartProvider({ children }) {\n  const [items, setItems] = useState([]);\n  const value = useMemo(\n    () => ({ items, setItems }),\n    [items]\n  );\n  return (\n    &lt;CartCtx.Provider value={value}&gt;\n      {children}\n    &lt;/CartCtx.Provider&gt;\n  );\n}" },
